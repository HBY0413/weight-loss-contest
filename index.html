<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 管理面板修正版</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --track: #edf2f7; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?q=80&w=2000'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* 佈局修正 */
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        
        /* 左側選單滾動修正 */
        .control-panel { 
            flex: 0 0 380px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
            max-height: 100%;
            padding-right: 8px;
        }
        .control-panel::-webkit-scrollbar { width: 6px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); overflow: hidden; }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-family: 'Courier New', Courier, monospace; font-weight: bold; border-top: 1px solid #333; }
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 10px; }
        
        /* 角色卡片 */
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.5); position: relative; }
        .rank-number { flex: 0 0 40px; text-align: center; font-size: 24px; font-weight: 900; color: var(--primary); }
        .p-info { flex: 0 0 130px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-percent { font-size: 22px; font-weight: 900; }
        .p-track { flex: 1; position: relative; height: 16px; background: var(--track); border-radius: 8px; margin-top: 10px; }
        .p-fill { height: 100%; border-radius: 8px; transition: width 1s, background-color 0.5s; }
        .runner { position: absolute; top: -38px; transition: left 1s; transform: translateX(-50%) scaleX(-1); font-size: 32px; animation: run-move 0.5s infinite alternate linear; }
        @keyframes run-move { from { transform: translateX(-50%) scaleX(-1) translateY(0); } to { transform: translateX(-50%) scaleX(-1) translateY(-6px); } }
        
        /* 選單樣式 */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #fff; }
        .menu-content.active { max-height: 2000px; padding: 20px; border-bottom: 1px solid #eee; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .sync-status { font-size: 10px; color: #999; text-align: center; padding: 5px; background: rgba(0,0,0,0.05); }

        /* 管理者清單專用樣式 */
        .admin-box { background: #f8f9fa; border: 2px dashed #ddd; border-radius: 15px; padding: 15px; margin-top: 20px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .admin-player-row:last-child { border-bottom: none; }
        .action-btns { display: flex; gap: 5px; }
        .btn-small { padding: 5px 10px; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <span style="font-size: 40px;">💰</span>
                <div style="font-size: 12px; opacity: 0.9;">2026 減肥戰士獎金池</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #1a253a; color: #fff; font-size: 11px; text-align: center; padding: 5px; opacity: 0.7;">賽期同步中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div class="sync-status" id="syncStatus">☁️ 雲端同步中...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="報名姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="目前體重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24 (標準)</option>
                        <option value="22">目標 BMI 22 (理想)</option>
                        <option value="20">目標 BMI 20 (精實)</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="自訂更新密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>

            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>

            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminPanel')">🔑 管理者與賽期設定 <span>+</span></button>
                <div id="adminPanel" class="menu-content">
                    <input type="password" id="adm_pw" placeholder="管理密碼">
                    <button class="btn-submit" onclick="doAdminLogin()">登入管理後台</button>
                    
                    <div id="adminDataArea" style="display:none;">
                        <div class="admin-box">
                            <label style="font-size:12px; font-weight:bold;">🕒 比賽時間設定</label>
                            <input type="date" id="set_start">
                            <input type="date" id="set_end">
                            <button class="btn-submit" onclick="savePeriod()" style="background:#444;">儲存賽期設定</button>
                        </div>
                        
                        <div class="admin-box">
                            <label style="font-size:12px; font-weight:bold;">👥 參賽者管理 (刪除/修改)</label>
                            <div id="adminPlayerList" style="margin-top:10px;">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413',
        repo: 'weight-loss-contest',
        path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };
    let fileSha = "";
    let localRankMap = {};

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${new Date().getTime()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            
            players.sort((a,b) => b.progress - a.progress).forEach((p, index) => { localRankMap[p.name] = index + 1; });
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            
            renderList();
            updateCountdown();
            // 如果後台是開啟狀態，同步完也更新後台名單
            if(document.getElementById('adminDataArea').style.display === 'block') renderAdminList();
            
            document.getElementById('syncStatus').innerText = `✅ 最後同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('syncStatus').innerText = "❌ 同步失敗"; }
    }

    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update Data", content, sha: fileSha })
        });
        syncFromGitHub();
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.length ? '' : '<div class="glass" style="padding:40px; text-align:center;">目前尚無挑戰者...</div>';
        
        sorted.forEach((p, i) => {
            const currentRank = i + 1;
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 50 ? '#f39c12' : '#e74c3c');
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-number">${currentRank}</div>
                    <div class="p-info">
                        <div class="p-name">${currentRank === 1 ? '👑 ' : ''}${p.name}</div>
                        <div class="p-percent" style="color:${color}">${p.progress}%</div>
                        <div class="update-time">更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="target-label">目標 BMI: ${p.tbmi}</div>
                        <div class="runner" style="left: ${barW}%;">🏃</div>
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                    </div>
                </div>`;
        });
    }

    // --- 管理者專用功能 ---
    function doAdminLogin() {
        const pw = document.getElementById('adm_pw').value;
        if(pw === 'gogofit666') {
            document.getElementById('adminDataArea').style.display = 'block';
            document.getElementById('set_start').value = period.start;
            document.getElementById('set_end').value = period.end;
            renderAdminList();
            alert("管理者登入成功，已開啟名單控制台。");
        } else {
            alert("密碼錯誤！");
        }
    }

    function renderAdminList() {
        const listArea = document.getElementById('adminPlayerList');
        if (players.length === 0) {
            listArea.innerHTML = '<div style="font-size:12px; color:#999; text-align:center;">空空如也</div>';
            return;
        }
        listArea.innerHTML = players.map((p, index) => `
            <div class="admin-player-row">
                <span style="font-size:13px;"><strong>${p.name}</strong></span>
                <div class="action-btns">
                    <button class="btn-small" style="background:var(--warning)" onclick="editPlayer(${index})">改體重</button>
                    <button class="btn-small" style="background:var(--danger)" onclick="deletePlayer(${index})">剔除</button>
                </div>
            </div>
        `).join('');
    }

    function deletePlayer(index) {
        if(confirm(`確定要將「${players[index].name}」從比賽中移除嗎？`)) {
            players.splice(index, 1);
            pushToGitHub();
        }
    }

    function editPlayer(index) {
        const p = players[index];
        const newSw = prompt(`修改「${p.name}」的【初始體重】(kg)：`, p.sw);
        if(newSw !== null && !isNaN(newSw)) {
            p.sw = parseFloat(newSw);
            // 重新計算進度
            p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
            pushToGitHub();
        }
    }

    function savePeriod() {
        period.start = document.getElementById('set_start').value;
        period.end = document.getElementById('set_end').value;
        if(!period.start || !period.end) return alert("請填入完整日期");
        pushToGitHub();
        alert("賽期已更新並上傳雲端！");
    }
    // ----------------------

    function updateCountdown() {
        const dDisp = document.getElementById('ddayDisplay');
        const pDisp = document.getElementById('periodDisplay');
        if(!period.start) return;
        pDisp.innerText = `期間：${period.start} ~ ${period.end}`;
        const now = new Date();
        const start = new Date(period.start.replace(/-/g, "/") + " 00:00:00");
        const end = new Date(period.end.replace(/-/g, "/") + " 23:59:59");
        let target = now < start ? start : (now <= end ? end : null);
        let prefix = now < start ? "距開賽還有 " : "剩餘賽程：";
        if (target) {
            const diff = target - now;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
            dDisp.innerText = `${prefix}${d}D ${h}:${m}:${s}`;
        } else dDisp.innerText = "本期賽事已結束";
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        const tbmi = parseFloat(document.getElementById('r_target_bmi').value);
        const acc = document.getElementById('r_acc').value;
        if(!name || !h || !sw || !acc) return alert("請填寫所有欄位！");
        const targetW = Math.round(((h/100)**2 * tbmi) * 10) / 10;
        players.push({ name, h, sw, cw: sw, tbmi, target: targetW, acc, progress: 0, lastUpdate: new Date().toLocaleDateString() });
        pushToGitHub();
        toggleMenu('none');
    }

    function doUpdate() {
        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("姓名或密碼驗證失敗！");
        p.cw = w;
        p.lastUpdate = new Date().toLocaleString();
        p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
        pushToGitHub();
        toggleMenu('none');
    }

    window.onload = () => { syncFromGitHub(); setInterval(updateCountdown, 1000); };
    setInterval(syncFromGitHub, 60000); 
</script>
</body>
</html>

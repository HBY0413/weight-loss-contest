<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('bg.jpg'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* --- 音樂控制區 (調整高度與右側齊平) --- */
        .music-controller {
            position: absolute;
            top: 5vh; /* 調整至齊平右側卡片上沿 */
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 100;
        }
        .speaker-icon {
            font-size: 20px;
            background: rgba(255, 255, 255, 0.85);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .music-text {
            font-size: 12px;
            font-weight: bold;
            color: #eee;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        
        /* --- 獎金池與動畫設定 --- */
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 25px 20px; text-align: center; position: relative; overflow: hidden; }
        #moneyBag { display: inline-block; cursor: pointer; margin-bottom: 10px; transition: transform 0.2s; user-select: none; }
        #moneyBag:active { transform: scale(1.1) rotate(5deg); }
        
        @keyframes coinFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
        }
        .coin-particle { position: absolute; font-size: 20px; pointer-events: none; z-index: 10; animation: coinFall 1s forwards ease-in; }

        .prize-amount { font-size: 38px; font-weight: 900; letter-spacing: -1px; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        
        /* --- 排行榜 --- */
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 15px; }
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.5); position: relative; min-height: 100px; }
        .rank-number { flex: 0 0 50px; text-align: center; font-size: 24px; font-weight: 900; color: var(--primary); }
        .p-info { flex: 0 0 145px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-track { flex: 1; position: relative; height: 14px; background: rgba(51, 51, 51, 0.15); border-radius: 7px; margin-top: 42px; }
        .p-fill { height: 100%; border-radius: 7px; position: absolute; left: 0; top: 0; transition: width 1s ease-in-out; }
        .runner-box { position: absolute; top: -54px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; transition: left 1s ease-in-out; }
        .runner-emoji { font-size: 30px; transform: scaleX(-1); }
        .runner-percent { font-size: 12px; font-weight: 900; background: rgba(255,255,255,0.9); padding: 1px 6px; border-radius: 10px; }

        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: #fff; }
        .menu-content.active { max-height: 1000px; padding: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="music-controller" onclick="toggleMusic()">
    <div class="speaker-icon" id="musicToggle">🔇</div>
    <div class="music-text">點擊開啟音樂</div>
</div>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" onclick="dropCoins()">
                    <span style="font-size: 45px;">💰</span>
                </div>
                <div style="font-size: 13px; opacity: 0.9; font-weight: bold;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #1a253a; color: #fff; font-size: 11px; text-align: center; padding: 5px; opacity: 0.7;">同步中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div id="syncStatus" style="font-size: 10px; color: #999; text-align: center; padding: 5px;">☁️</div>
        </div>

        <div class="glass">
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" placeholder="姓名">
                <input type="number" placeholder="身高(cm)">
                <button class="btn-submit">確認報名</button>
            </div>
            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <input type="number" placeholder="今日體重(kg)">
                <button class="btn-submit" style="background:var(--success);">同步數據</button>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };

    function formatMoney(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 重新補回的金幣噴發效果
    function dropCoins() {
        const bag = document.getElementById('moneyBag');
        const container = bag.parentElement;
        const emojis = ['🪙', '✨', '💰', '💵'];
        
        for (let i = 0; i < 8; i++) {
            const coin = document.createElement('div');
            coin.className = 'coin-particle';
            coin.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            coin.style.left = `calc(50% + ${Math.random() * 100 - 50}px)`;
            coin.style.top = '40px';
            container.appendChild(coin);
            setTimeout(() => coin.remove(), 1000);
        }
    }

    function toggleMusic() {
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        if (music.paused) {
            music.play();
            toggleBtn.innerText = "🔊";
        } else {
            music.pause();
            toggleBtn.innerText = "🔇";
        }
    }

    async function syncData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "2026-04-09", end: "2026-04-13" };
            render();
        } catch (e) { console.error("同步失敗", e); }
    }

    function render() {
        document.getElementById('totalPrize').innerText = `NT$ ${formatMoney(players.length * 500)}`;
        document.getElementById('periodDisplay').innerText = `期間：${period.start} ~ ${period.end}`;
        
        const container = document.getElementById('rankContainer');
        container.innerHTML = '';
        const sorted = [...players].sort((a,b) => b.progress - a.progress);

        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-number">${i + 1}</div>
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div style="font-size:10px;color:#999;">最後更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${p.progress >= 80 ? '#27ae60' : '#e67e22'};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isActive = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isActive) target.classList.add('active');
    }

    window.onload = syncData;
</script>
</body>
</html>

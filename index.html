<div class="menu-item">
    <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
    <div id="adminForm" class="menu-content">
        <div id="admin_auth_zone">
            <input type="password" id="admin_key" placeholder="輸入管理者密鑰">
            <button class="btn-submit" style="background:var(--accent);" onclick="verifyAdmin()">驗證權限</button>
        </div>
        
        <div id="admin_setting_zone" style="display: none; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px;">
            <div style="font-size: 12px; color: var(--gold); margin-bottom: 10px;">✅ 驗證成功，請設定比賽區間：</div>
            <label style="font-size: 11px; color: rgba(255,255,255,0.6);">開始日期</label>
            <input type="date" id="start_date">
            <label style="font-size: 11px; color: rgba(255,255,255,0.6);">結束日期</label>
            <input type="date" id="end_date">
            <button class="btn-submit" style="background:var(--warning);" onclick="doAdminSync()">同步至 GitHub</button>
        </div>
    </div>
</div>

<script>
    // 專屬於管理者選單的邏輯控制
    function verifyAdmin() {
        const key = document.getElementById('admin_key').value;
        // 這裡可以放入你的預設密鑰，或單純檢查是否為空
        if (key === "YOUR_PASSWORD") { 
            document.getElementById('admin_auth_zone').style.display = 'none';
            document.getElementById('admin_setting_zone').style.display = 'block';
        } else {
            alert("密鑰錯誤，請重新輸入");
            document.getElementById('admin_key').value = "";
        }
    }

    // 重新展開選單時，重置管理者狀態（選用）
    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => { 
            el.classList.remove('active'); 
            el.style.maxHeight = "0"; 
        });
        
        if (!isOpen) { 
            target.classList.add('active'); 
            target.style.maxHeight = "1000px";
            // 如果是管理者選單，重置回密碼輸入畫面
            if(id === 'adminForm') {
                document.getElementById('admin_auth_zone').style.display = 'block';
                document.getElementById('admin_setting_zone').style.display = 'none';
                document.getElementById('admin_key').value = "";
            }
        }
    }
</script>

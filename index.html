<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士挑戰賽</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f8f9fa; --text: #333; --danger: #e74c3c; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 10px; }
        .prize-box { background: linear-gradient(135deg, var(--accent), #d35400); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(230,126,34,0.3); }
        .prize-amount { font-size: 36px; font-weight: bold; margin: 5px 0; }
        
        /* 核心按鈕樣式 */
        .btn-core { display: block; width: 100%; max-width: 300px; margin: 15px auto; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; }
        .btn-register { background: #edf2f7; color: var(--primary); border: 1px solid #e2e8f0; }
        .btn-register:hover { background: #e2e8f0; }
        .btn-admin { background: transparent; color: #718096; font-size: 14px; text-decoration: underline; margin-top: 5px; }
        
        /* 表單區域 */
        .form-panel { background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #edf2f7; margin-bottom: 20px; display: none; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; width: 100%; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 排行榜 */
        .rank-card { background: #fff; border: 1px solid #edf2f7; padding: 18px; border-radius: 12px; margin-bottom: 15px; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .player-name { font-weight: bold; font-size: 18px; }
        .progress-text { font-weight: bold; color: #27ae60; font-size: 18px; }
        .progress-bg { background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-bar { background: #27ae60; height: 100%; border-radius: 6px; transition: width 1s ease-in-out; }
        
        /* 管理者後台 */
        .admin-panel { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #cbd5e0; display: none; }
        .admin-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .admin-table th, .admin-table td { border: 1px solid #eee; padding: 10px; }
        .admin-table th { background: #f8f9fa; }
        .danger-text { color: var(--danger); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 減肥遊戲挑戰賽</h1>
    <p style="text-align: center; color: #718096; margin-top: -10px;">三個月計畫：邁向 BMI 24 巔峰</p>

    <div class="prize-box">
        <div>目前總獎金池</div>
        <div class="prize-amount" id="totalPrize">NT$ 0</div>
        <div id="participantCount">共 0 人參賽</div>
    </div>

    <div id="rankContainer">
        </div>

    <div id="entryButtons">
        <button class="btn-core btn-register" onclick="togglePanel('registerForm')">我要填寫資料報名</button>
        <button class="btn-core btn-admin" onclick="togglePanel('adminLogin')">管理者後台入口</button>
    </div>

    <div id="registerForm" class="form-panel">
        <h3>參賽者一次性報名</h3>
        <p style="font-size:12px; color:gray; margin-top:-10px;">請準確填寫，身高與初始體重送出後無法自行修改。</p>
        <div class="form-group">
            <input type="text" id="reg_name" placeholder="姓名">
            <input type="number" id="reg_h" placeholder="身高 (cm)">
            <input type="number" id="reg_sw" placeholder="初始體重 (kg)">
            <input type="number" id="reg_cw" placeholder="本週體重 (kg)">
        </div>
        <button class="btn-submit" onclick="submitRegistration()">確認送出報名 (繳費 500)</button>
    </div>

    <div id="adminLogin" class="form-panel">
        <h3>管理者登入</h3>
        <input type="password" id="admin_pw" placeholder="請輸入管理密碼" style="margin-bottom:10px;">
        <button class="btn-submit" onclick="loginAdmin()">登入後台</button>
    </div>

    <div id="adminPanel" class="admin-panel form-panel">
        <h3>管理者數據更新區 (僅管理者可見)</h3>
        <p style="font-size:12px; color:gray;">您可以在此修正錯誤數據或更新每週體重。</p>
        <div class="form-group">
            <input type="text" id="admin_name" placeholder="姓名 (需與報名時相同)">
            <input type="number" id="admin_h" placeholder="身高 (cm)">
            <input type="number" id="admin_sw" placeholder="初始體重 (kg)">
            <input type="number" id="admin_cw" placeholder="本週體重 (kg)">
        </div>
        <button class="btn-submit" onclick="updateData()">更新選手數據</button>
        
        <table class="admin-table">
            <thead><tr><th>姓名</th><th>身高</th><th>初始</th><th>目前</th><th>目標(BMI24)</th><th>操作</th></tr></thead>
            <tbody id="adminList"></tbody>
        </table>
        <button class="btn-submit" style="background:#95a5a6; margin-top:15px;" onclick="logoutAdmin()">登出後台</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = 'gogofit666'; // 管理密碼
    let players = JSON.parse(localStorage.getItem('diet_contest_v2')) || [];

    // 通用面板切換函數
    function togglePanel(panelId) {
        const panels = ['registerForm', 'adminLogin', 'adminPanel'];
        panels.forEach(id => {
            if (id !== panelId) document.getElementById(id).style.display = 'none';
        });
        const p = document.getElementById(panelId);
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    // 1. 參賽者報名
    function submitRegistration() {
        const name = document.getElementById('reg_name').value;
        const h = parseFloat(document.getElementById('reg_h').value);
        const sw = parseFloat(document.getElementById('reg_sw').value);
        const cw = parseFloat(document.getElementById('reg_cw').value);

        if (!name || !h || !sw || !cw) return alert("資料請填寫完整！");
        if (players.some(p => p.name === name)) return alert("此姓名已報名過，若需更新請聯絡管理者。");

        // 計算 BMI 24 目標
        const target = Math.round(((h / 100) ** 2 * 24) * 10) / 10;
        const progress = ((sw - cw) / (sw - target) * 100).toFixed(1);

        players.push({ name, h, sw, cw, target, progress });
        localStorage.setItem('diet_contest_v2', JSON.stringify(players));
        
        // 清空表單並隱藏
        ['reg_name', 'reg_h', 'reg_sw', 'reg_cw'].forEach(id => document.getElementById(id).value = '');
        togglePanel('registerForm');
        render();
        alert("報名成功！祝您奪得獎金！");
    }

    // 2. 管理者登入
    function loginAdmin() {
        const pw = document.getElementById('admin_pw').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderAdmin();
        } else {
            alert("密碼錯誤！");
        }
    }

    function logoutAdmin() {
        document.getElementById('admin_pw').value = '';
        togglePanel('adminPanel');
    }

    // 3. 管理者更新數據
    function updateData() {
        const name = document.getElementById('admin_name').value;
        const h = parseFloat(document.getElementById('admin_h').value);
        const sw = parseFloat(document.getElementById('admin_sw').value);
        const cw = parseFloat(document.getElementById('admin_cw').value);

        if (!name || !h || !sw || !cw) return alert("資料請填寫完整！");

        const index = players.findIndex(p => p.name === name);
        if (index === -1) return alert("找不到此參賽者，請確認姓名是否正確。");

        const target = Math.round(((h / 100) ** 2 * 24) * 10) / 10;
        const progress = ((sw - cw) / (sw - target) * 100).toFixed(1);

        players[index] = { name, h, sw, cw, target, progress };
        localStorage.setItem('diet_contest_v2', JSON.stringify(players));
        render();
        renderAdmin();
        alert("選手數據更新成功！");
    }

    function deletePlayer(index) {
        if (confirm("確定移除這位勇士的所有數據？此操作無法復原。")) {
            players.splice(index, 1);
            localStorage.setItem('diet_contest_v2', JSON.stringify(players));
            render();
            renderAdmin();
        }
    }

    // 4. 渲染公開排行榜 (隱藏隱私)
    function render() {
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);

        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        document.getElementById('participantCount').innerText = `共 ${players.length} 人參賽`;

        container.innerHTML = sorted.length ? '' : '<p style="text-align:center; color:#ccc; margin: 30px 0;">尚無參賽者數據，趕快報名吧！</p>';
        sorted.forEach((p, i) => {
            const barWidth = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-header">
                        <span class="player-name">${i === 0 ? '🥇 ' : ''}${p.name}</span>
                        <span class="progress-text">${p.progress}%</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-bar" style="width: ${barWidth}%"></div>
                    </div>
                </div>
            `;
        });
    }

    // 5. 渲染管理者表格 (顯示所有隱私)
    function renderAdmin() {
        const adminList = document.getElementById('adminList');
        adminList.innerHTML = '';
        players.forEach((p, i) => {
            adminList.innerHTML += `
                <tr>
                    <td>${p.name}</td><td>${p.h}</td><td>${p.sw}</td><td>${p.cw}</td><td>${p.target}kg</td>
                    <td><button onclick="deletePlayer(${i})" style="font-size:10px; background:#e74c3c; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">刪除</button></td>
                </tr>
            `;
        });
    }

    // 初始化
    render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD 體態健康挑戰賽 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; --danger: #e74c3c; }
        html { background-color: #0d1117; overscroll-behavior-y: none; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; 
            min-height: 100vh; display: flex; align-items: flex-start; 
            justify-content: center; color: var(--text); overflow-y: auto; padding: 20px 0;
        }
        
        /* 隱藏捲軸但保持滾動 */
        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-thumb { background: rgba(241,196,15,0.3); border-radius: 10px; }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; transition: all 1s ease-in-out;
        }
        @keyframes title-reveal {
            from { opacity: 0; transform: scale(0.8); letter-spacing: 30px; filter: blur(10px); }
            to { opacity: 1; transform: scale(1); letter-spacing: 15px; filter: blur(0); }
        }
        .animate-title { animation: title-reveal 2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        .intro-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer;
            backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s;
        }
        .intro-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); }

        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; min-height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }
        .glass { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        
        .sync-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sync-style-text { font-size: 10px; color: rgba(255, 255, 255, 0.5); white-space: nowrap; }
        
        #musicControl { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: rgba(255,255,255,0.03); }
        #musicControl:hover { background: rgba(255,255,255,0.08); }

        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; position: relative; }
        .treasure-header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.1); }
        
        .menu-trigger { width: 100%; padding: 15px 20px; background: transparent; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .menu-trigger:hover { background: rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 85vh; overflow-y: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.12); }
        
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .rank-card { 
            padding: 15px 25px; display: flex; align-items: center; gap: 20px; 
            position: relative; background: rgba(35, 35, 35, 0.4); 
            backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); 
            transition: transform 0.3s, border-color 0.3s;
        }
        .rank-card.is-final { border: 1px solid rgba(241, 196, 15, 0.4); box-shadow: 0 0 20px rgba(241, 196, 15, 0.1); }
        
        .p-info { flex: 0 0 160px; }
        .p-track { flex: 1; height: 10px; background: rgba(255,255,255,0.08); border-radius: 10px; position: relative; margin-top: 25px; }
        .p-fill { height: 100%; border-radius: 10px; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); position: absolute; }
        
        .runner-box { position: absolute; top: -38px; transform: translateX(-50%); transition: left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 24px; animation: bounce 0.6s linear infinite alternate; transform: scaleX(-1); display: inline-block; }
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-6px) scaleX(-1); } }
        
        .final-stats { display: flex; gap: 15px; margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.5); }
        .stat-badge { background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { color: var(--gold); font-weight: bold; }

        .final-badge { background: var(--gold); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div style="position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 10001;">
        <button class="intro-btn" onclick="toggleMusic()" id="introMusicBtn">🔊 Music: OFF</button>
        <button class="intro-btn" style="border-color: var(--gold); color: var(--gold);" onclick="closeIntro()">SKIP ❯❯</button>
    </div>
    <div style="text-align: center;">
        <h1 id="intro-title" style="font-size: 80px; font-weight: 900; color: var(--gold); margin: 0; opacity: 0; filter: drop-shadow(0 0 20px rgba(241,196,15,0.5));">ASGARD</h1>
        <p id="intro-sub" style="color: rgba(255,255,255,0.4); letter-spacing: 10px; margin-top: 10px; opacity: 0;">BODY TRANSFORMATION 2026</p>
    </div>
    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1);">
        <div id="intro-bar" style="width: 0%; height: 100%; background: var(--gold); transition: width 5s linear;"></div>
    </div>
</div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div id="musicControl" onclick="toggleMusic()">
                <span id="musicToggle" style="font-size: 20px;">🔇</span> 
                <div>
                    <div id="musicStatusText" style="font-size: 13px; font-weight: bold;">背景音樂已靜音</div>
                    <div class="sync-style-text">點擊切換播放狀態</div>
                </div>
            </div>
            <div class="sync-row" onclick="syncFromGitHub()" style="cursor:pointer;">
                <span class="sync-style-text" id="syncTime">最後同步：等待中...</span>
                <span style="font-size: 12px; color: var(--gold);">手動重新整理 🔄</span>
            </div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 50px; cursor: pointer; display: inline-block; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px; letter-spacing: 1px;">2026 ASGARD 總獎金</div>
                <div style="font-size: 36px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3);" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="text-align:center; padding: 10px; font-size: 11px; background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.5);">期間：未設定 ~ 2026-04-13</div>
            <div id="ddayDisplay" style="text-align:center; padding: 15px; background: rgba(0,0,0,0.4); color: var(--gold); font-weight: bold; font-family: 'Courier New', monospace; font-size: 22px; letter-spacing: 1px;">00D 00:00:00</div>
        </div>

        <div class="glass"> 
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高(cm)">
                <input type="number" id="r_w" placeholder="初始體重(kg)">
                <input type="number" id="r_waist" placeholder="初始腰圍(吋)">
                <input type="number" id="r_smm" placeholder="初始肌肉量 SMM(kg)">
                <input type="number" id="r_fat_kg" placeholder="初始脂肪重(kg)">
                <select id="r_target_bmi">
                    <option value="24">目標 BMI 24 | 健康維護</option>
                    <option value="22">目標 BMI 22 | 精實健美</option>
                    <option value="20">目標 BMI 20 | 極致挑戰</option>
                </select>
                <input type="password" id="r_acc" placeholder="設定更新密碼">
                <button id="regBtn" style="width:100%; padding:14px; background:var(--gold); color:#000; border:none; border-radius:10px; font-weight:900; cursor:pointer;" onclick="doRegister()">確認報名參賽</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新紀錄 / 結算 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <div id="finalNotice" style="display:none; background:rgba(241,196,15,0.1); padding:10px; border-radius:8px; margin-bottom:10px; font-size:12px; color:var(--gold); border:1px dashed var(--gold);">
                    🏁 <b>今日為最終結算日！</b><br>請務必填寫 InBody 肌肉與脂肪數據。
                </div>
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="密碼">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="u_w" placeholder="體重(kg)">
                    <input type="number" id="u_waist" placeholder="腰圍(吋)">
                </div>
                <div id="finalArea" style="opacity:0.5">
                    <input type="number" id="u_smm" placeholder="最終肌肉量(kg)" disabled>
                    <input type="number" id="u_fat_kg" placeholder="最終脂肪重(kg)" disabled>
                    <input type="text" id="u_img" placeholder="InBody照片連結" disabled>
                </div>
                <button id="updBtn" style="width:100%; padding:14px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="doUpdate()">同步數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者 <span>+</span></button>
            <div id="adminForm" class="menu-content">
                <div id="adminLoginSection">
                    <input type="password" id="adm_pw" placeholder="管理者密鑰">
                    <button style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="doAdminLogin()">登入</button>
                </div>
                <div id="adminDataArea" style="display:none; margin-top:10px;">
                    <label style="font-size:11px; color:#aaa;">賽期設定：</label>
                    <input type="date" id="set_start">
                    <input type="date" id="set_end">
                    <button style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; margin-bottom:10px;" onclick="savePeriod()">更新賽期</button>
                    <div id="adminPlayerList"></div>
                    <button style="width:100%; padding:10px; background:none; color:#ff4d4d; border:1px solid #ff4d4d; border-radius:8px; cursor:pointer; margin-top:10px;" onclick="doAdminLogout()">登出管理員</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let prevRankMap = {};
    let period = { start: "", end: "2026-04-13" };
    let fileSha = "";
    let isFinalDay = false;

    // --- 初始化與動畫 ---
    function runIntroAnimation() {
        const title = document.getElementById('intro-title');
        const sub = document.getElementById('intro-sub');
        const bar = document.getElementById('intro-bar');
        setTimeout(() => { title.classList.add('animate-title'); }, 200);
        setTimeout(() => { sub.style.opacity = "1"; sub.style.letterSpacing = "5px"; sub.style.transition = "2s"; }, 1000);
        setTimeout(() => { bar.style.width = "100%"; }, 100);
        window.introTimer = setTimeout(closeIntro, 5500);
    }

    function closeIntro() {
        clearTimeout(window.introTimer);
        const overlay = document.getElementById('intro-overlay');
        overlay.style.opacity = "0";
        overlay.style.transform = "scale(1.1)";
        setTimeout(() => { overlay.remove(); makeItRain(); }, 1000);
    }

    // --- 資料同步 ---
    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            
            // 紀錄舊排名
            const oldSorted = [...players].sort((a, b) => b.progress - a.progress);
            prevRankMap = {};
            oldSorted.forEach((p, index) => { prevRankMap[p.name] = index + 1; });

            players = content.players || [];
            period = content.period || { start: "", end: "2026-04-13" };
            
            checkFinalPhase();
            renderList();
            updateCountdown();
            document.getElementById('syncTime').innerText = `最後同步：${new Date().toLocaleTimeString()}`;
            document.getElementById('periodDisplay').innerText = `期間：${period.start || '未設定'} ~ ${period.end}`;
            if(localStorage.getItem('admin_auth') === 'true') showAdminUI();
        } catch (e) { console.error("同步失敗", e); }
    }

    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT", headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update Data", content, sha: fileSha })
        });
        if (!res.ok) throw new Error("同步衝突，請重新整理");
        await syncFromGitHub();
    }

    function checkFinalPhase() {
        const end = new Date(period.end + "T23:59:59").getTime();
        const now = new Date().getTime();
        isFinalDay = (end - now < 86400000 && end - now > -86400000); // 結束前後24小時內
        
        const area = document.getElementById('finalArea');
        const notice = document.getElementById('finalNotice');
        const inputs = area.querySelectorAll('input');

        if(isFinalDay) {
            area.style.opacity = "1";
            inputs.forEach(i => i.disabled = false);
            notice.style.display = "block";
        }
    }

    // --- 列表渲染 ---
    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(parseFloat(p.progress) || 0, 0), 100);
            const currentRank = i + 1;
            const lastRank = prevRankMap[p.name];
            const color = barW >= 80 ? '#27ae60' : (barW >= 40 ? '#f39c12' : '#e74c3c');
            const speed = 0.8 - (barW / 100 * 0.5);

            let trendHtml = `<span style="font-size:10px; color:#95a5a6;">-</span>`;
            if (lastRank) {
                if (currentRank < lastRank) trendHtml = `<span style="color:#2ecc71;">▲</span>`;
                else if (currentRank > lastRank) trendHtml = `<span style="color:#e74c3c;">▼</span>`;
            }

            // 結算數據顯示
            let statsHtml = '';
            if(p.isFinal) {
                const smmDiff = (p.csmm - p.ssmm).toFixed(1);
                const fatDiff = (p.sfat - p.cfat).toFixed(1);
                statsHtml = `
                    <div class="final-stats">
                        <span class="stat-badge">肌肉: <b class="${smmDiff >=0 ? 'gold-text':''}">${smmDiff >=0 ? '+':''}${smmDiff}kg</b></span>
                        <span class="stat-badge">脂肪: <b style="color:#e74c3c;">-${fatDiff}kg</b></span>
                        <a href="${p.finalImg}" target="_blank" style="color:var(--gold); text-decoration:none;">[查看 InBody]</a>
                    </div>`;
            }

            return `
                <div class="rank-card ${p.isFinal ? 'is-final' : ''}">
                    <div style="font-size: 28px; font-weight: 900; color: var(--gold); width: 50px; text-align:center; line-height:1;">
                        ${currentRank}<br>${trendHtml}
                    </div>
                    <div class="p-info">
                        <div style="font-size: 18px; font-weight: bold; display: flex; align-items: center;">
                            ${currentRank === 1 ? '👑 ' : ''}${p.name}
                            ${p.isFinal ? '<span class="final-badge">FINISH</span>' : ''}
                        </div>
                        <div style="font-size: 10px; opacity: 0.5; margin-top: 4px;">更新於: ${p.lastUpdate ? p.lastUpdate.split(' ')[1] : '-'}</div>
                        ${statsHtml}
                    </div>
                    <div class="p-track">
                        <div style="position: absolute; right: 0; top: -18px; font-size: 10px; color: var(--gold); font-weight: bold;">GOAL BMI ${p.tbmi} 🏁</div>
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 15px ${color}66;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <div style="font-size: 10px; font-weight: bold; margin-bottom: 2px; background:rgba(0,0,0,0.5); padding:1px 4px; border-radius:4px;">${barW}%</div>
                            <span class="runner-emoji" style="animation-duration: ${speed}s">${p.isFinal && barW >= 100 ? '🏆' : '🏃'}</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // --- 業務邏輯 ---
    async function doRegister() {
        const name = document.getElementById('r_name').value.trim();
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        const swaist = parseFloat(document.getElementById('r_waist').value);
        const ssmm = parseFloat(document.getElementById('r_smm').value);
        const sfat = parseFloat(document.getElementById('r_fat_kg').value);
        const tbmi = parseFloat(document.getElementById('r_target_bmi').value);
        const acc = document.getElementById('r_acc').value;

        if(!name || isNaN(h) || !acc) return alert("資訊不完整");
        
        try {
            await syncFromGitHub();
            if(players.some(p => p.name === name)) throw new Error("此姓名已參加");
            players.push({ 
                name, h, sw, cw: sw, swaist, cwaist: swaist, ssmm, csmm: ssmm, sfat, cfat: sfat,
                tbmi, acc, progress: 0, lastUpdate: new Date().toLocaleString() 
            });
            await pushToGitHub();
            alert("報名成功！勇士，歡迎加入亞斯格特！");
            toggleMenu('regForm');
        } catch(e) { alert(e.message); }
    }

    async function doUpdate() {
        const name = document.getElementById('u_name').value.trim();
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const waist = parseFloat(document.getElementById('u_waist').value);
        
        try {
            await syncFromGitHub();
            const p = players.find(x => x.name === name && x.acc === acc);
            if(!p) throw new Error("認證失敗");

            p.cw = w; p.cwaist = waist; p.lastUpdate = new Date().toLocaleString();

            if(isFinalDay) {
                const fsmm = parseFloat(document.getElementById('u_smm').value);
                const ffat = parseFloat(document.getElementById('u_fat_kg').value);
                const img = document.getElementById('u_img').value;
                if(isNaN(fsmm) || !img) throw new Error("結算資料不全");
                
                p.csmm = fsmm; p.cfat = ffat; p.finalImg = img; p.isFinal = true;
                // 結算公式：肌肉增長率*250 + 脂肪減少率*150 (鼓勵增肌)
                const smmGrowth = ((fsmm - p.ssmm) / p.ssmm) * 250;
                const fatLoss = ((p.sfat - ffat) / p.sfat) * 150;
                p.progress = Math.max(0, (smmGrowth + fatLoss)).toFixed(1);
            } else {
                const targetW = p.tbmi * ((p.h/100)*(p.h/100));
                const wScore = (1 - (Math.abs(w - targetW) / Math.abs(p.sw - targetW))) * 100;
                const waistScore = ((p.swaist - waist) / (p.swaist * 0.1)) * 100;
                p.progress = Math.max(0, (wScore * 0.6 + waistScore * 0.4)).toFixed(1);
            }
            
            await pushToGitHub();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            alert("數據同步完成！");
            toggleMenu('updForm');
        } catch (e) { alert(e.message); }
    }

    // --- 工具函式 ---
    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        const txt = document.getElementById('musicStatusText');
        const introBtn = document.getElementById('introMusicBtn');
        if (m.paused) {
            m.play(); btn.innerText = "🔊"; txt.innerText = "背景音樂播放中";
            if(introBtn) introBtn.innerText = "🔊 Music: ON";
        } else {
            m.pause(); btn.innerText = "🔇"; txt.innerText = "背景音樂已靜音";
            if(introBtn) introBtn.innerText = "🔇 Music: OFF";
        }
    }

    function doAdminLogin() {
        if(document.getElementById('adm_pw').value === 'gogofit666') {
            localStorage.setItem('admin_auth', 'true'); showAdminUI();
        } else { alert("密碼錯誤"); }
    }

    function showAdminUI() {
        document.getElementById('adminLoginSection').style.display = 'none';
        document.getElementById('adminDataArea').style.display = 'block';
        document.getElementById('set_start').value = period.start;
        document.getElementById('set_end').value = period.end;
        document.getElementById('adminPlayerList').innerHTML = players.map((p, i) => `
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; background:rgba(255,255,255,0.1); padding:5px; border-radius:4px;">
                ${p.name} <span onclick="deletePlayer(${i})" style="color:red; cursor:pointer;">[刪除]</span>
            </div>`).join('');
    }

    function doAdminLogout() { localStorage.removeItem('admin_auth'); location.reload(); }
    
    async function deletePlayer(i) { if(confirm("確定刪除？")) { players.splice(i,1); await pushToGitHub(); } }

    async function savePeriod() { 
        period.start = document.getElementById('set_start').value; 
        period.end = document.getElementById('set_end').value; 
        await pushToGitHub(); alert("賽期更新成功"); 
    }

    function makeItRain() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f1c40f', '#e67e22', '#ffffff'] });
        const bag = document.getElementById('moneyBag');
        bag.style.transform = 'scale(1.4) rotate(15deg)';
        setTimeout(() => bag.style.transform = 'scale(1) rotate(0deg)', 200);
    }

    function updateCountdown() {
        if(!period.end) return;
        const target = new Date(period.end + "T23:59:59").getTime();
        const now = new Date().getTime();
        const distance = target - now;
        if (distance < 0) { document.getElementById('ddayDisplay').innerText = "亞斯格特賽事結束"; return; }
        const d = Math.floor(distance / 86400000);
        const h = Math.floor((distance % 86400000) / 3600000);
        const m = Math.floor((distance % 3600000) / 60000);
        const s = Math.floor((distance % 60000) / 1000);
        document.getElementById('ddayDisplay').innerText = `${String(d).padStart(2,'0')}D ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    window.onload = () => {
        runIntroAnimation();
        syncFromGitHub();
        setInterval(syncFromGitHub, 30000);
        setInterval(updateCountdown, 1000);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽 (API 版)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden;
        }
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .glass { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .menu-trigger { width: 100%; padding: 15px 20px; background: transparent; border: none; text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 500px; padding: 15px 20px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        .rank-display { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
        .rank-card { padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; min-height: 100px; background: rgba(40, 40, 40, 0.5) !important; }
        .p-info { flex: 0 0 160px; }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 40px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -48px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 28px; animation: bounce linear infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .admin-controls { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.2); display: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold;">2026Y ASGARD 總獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">載入中...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="upd_name" placeholder="參賽者姓名">
                    <input type="number" id="upd_weight" placeholder="今日體重 (kg)">
                    <button class="btn-main" style="background:var(--success); color:white;" onclick="handleUpdateWeight()">同步至 GitHub</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者與 API 設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <div id="loginSection">
                        <input type="password" id="adminKeyInput" placeholder="輸入管理者密鑰 (預設: asgard2026)">
                        <button class="btn-main" style="background:var(--accent); color:white;" onclick="loginAdmin()">驗證權言</button>
                    </div>
                    <div id="adminControls" class="admin-controls">
                        <input type="password" id="ghTokenInput" placeholder="填入 GitHub PAT Token">
                        <button class="btn-main" style="background:var(--primary); color:white;" onclick="saveGhToken()">儲存 Token</button>
                        <button class="btn-main" style="background:#7f8c8d; color:white;" onclick="logoutAdmin()">登出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 配置資訊 (請修改為你的 Repo 資訊)
    const GH_CONFIG = {
        owner: "你的GitHub帳號",
        repo: "你的Repo名稱",
        path: "data.json"
    };

    let players = [];
    const ADMIN_SECRET = "asgard2026";
    const targetDate = new Date("2026-04-13T23:59:59").getTime();

    // 1. 初始化
    window.onload = () => {
        fetchData();
        updateCountdown();
        setInterval(updateCountdown, 1000);
        if (localStorage.getItem('asgard_admin_token') === 'true') showAdminPanel();
    };

    // 2. 抓取資料 (GitHub API GET)
    async function fetchData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}?t=${Date.now()}`);
            const data = await res.json();
            const content = decodeURIComponent(escape(atob(data.content))); // 處理中文亂碼
            players = JSON.parse(content);
            localStorage.setItem('gh_file_sha', data.sha); // 儲存 SHA 供寫入使用
            renderList();
        } catch (e) { console.error("資料加載失敗", e); }
    }

    // 3. 寫入資料 (GitHub API PUT)
    async function pushToGithub(newData) {
        const token = localStorage.getItem('gh_token');
        const sha = localStorage.getItem('gh_file_sha');
        if (!token) return alert("請先在管理者設定中填入 GitHub Token！");

        const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: `Update weight by Web Interface ${new Date().toLocaleString()}`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2)))),
                sha: sha
            })
        });

        if (res.ok) {
            alert("同步成功！資料將在幾秒後更新。");
            fetchData();
        } else {
            alert("同步失敗，請檢查 Token 權限或 Repo 路徑。");
        }
    }

    // 4. 體重更新邏輯
    function handleUpdateWeight() {
        const name = document.getElementById('upd_name').value;
        const weight = parseFloat(document.getElementById('upd_weight').value);
        if (!name || !weight) return alert("請填寫姓名與體重");

        const userIndex = players.findIndex(p => p.name === name);
        if (userIndex === -1) return alert("找不到該參賽者");

        // 計算新進度 (簡單範例邏輯)
        const p = players[userIndex];
        const totalDiff = Math.abs(p.initial_w - p.target_w);
        const currentDiff = Math.abs(p.initial_w - weight);
        p.progress = Math.min(Math.round((currentDiff / totalDiff) * 1000) / 10, 100);
        p.last_upd = new Date().toLocaleString('zh-TW', {hour12: true});

        pushToGithub(players);
    }

    // --- 以下為 UI 邏輯 ---
    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        container.innerHTML = sorted.map((p, i) => {
            const barW = p.progress;
            const isLosing = p.target_w < p.initial_w;
            const speed = 0.6 - (barW / 100 * 0.45);
            return `<div class="glass rank-card">
                <div style="font-size:24px; font-weight:900; color:var(--gold); width:30px;">${i+1}</div>
                <div class="p-info">
                    <div style="font-size:18px; font-weight:bold;">${i===0?'👑 ':''}${p.name} <span class="bmi-tag ${isLosing?'tag-lose':'tag-gain'}">${isLosing?'減重':'增重'}</span></div>
                    <div style="font-size:11px; opacity:0.6;">更新: ${p.last_upd}</div>
                </div>
                <div class="p-track">
                    <div class="p-fill" style="width:${barW}%; background:${barW>=80?'#27ae60':(barW>=40?'#f39c12':'#e74c3c')};"></div>
                    <div class="runner-box" style="left:${barW}%;">
                        <div style="font-size:10px;">${barW}%</div><span class="runner-emoji" style="animation-duration:${speed}s">🏃</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function saveGhToken() {
        const token = document.getElementById('ghTokenInput').value;
        if (token) { localStorage.setItem('gh_token', token); alert("Token 已儲存"); }
    }

    function loginAdmin() {
        if (document.getElementById('adminKeyInput').value === ADMIN_SECRET) {
            localStorage.setItem('asgard_admin_token', 'true');
            showAdminPanel();
        } else { alert("密鑰錯誤"); }
    }

    function logoutAdmin() {
        localStorage.removeItem('asgard_admin_token');
        location.reload();
    }

    function showAdminPanel() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminControls').style.display = 'block';
        if (localStorage.getItem('gh_token')) document.getElementById('ghTokenInput').value = "********";
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function updateCountdown() {
        const distance = targetDate - new Date().getTime();
        if (distance < 0) { document.getElementById('ddayDisplay').innerText = "比賽結束！"; return; }
        const d = Math.floor(distance / 86400000);
        const h = Math.floor((distance % 86400000) / 3600000);
        const m = Math.floor((distance % 3600000) / 60000);
        const s = Math.floor((distance % 60000) / 1000);
        document.getElementById('ddayDisplay').innerText = `${String(d).padStart(2,'0')}D ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function makeItRain() { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); }
</script>
</body>
</html>

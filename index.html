<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 勇往直前</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --track: #edf2f7; }
        
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; padding: 0;
            background-image: url('https://images.unsplash.com/photo-1519810755548-39cd217da494?q=80&w=2000');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .main-layout { 
            display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 85vh; align-items: flex-start;
        }

        /* --- 左側控制區 --- */
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; }

        .glass { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.4);
            overflow: hidden;
        }

        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }

        /* --- 摺疊選單設計 --- */
        .menu-item { border-bottom: 1px solid #eee; }
        .menu-trigger { 
            width: 100%; padding: 18px 25px; background: white; border: none; text-align: left;
            font-size: 16px; font-weight: bold; color: var(--primary); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .menu-trigger:hover { background: #f8f9fa; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #fff; }
        .menu-content.active { max-height: 600px; padding: 20px; border-top: 1px solid #f1f1f1; }

        /* --- 右側排行區 --- */
        .rank-display { 
            flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; 
            overflow-y: auto; padding-right: 10px;
        }

        .rank-card { 
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px;
            display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .p-info { flex: 0 0 140px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-percent { font-size: 24px; color: var(--success); font-weight: 900; margin: 2px 0; }

        .p-track { flex: 1; position: relative; height: 16px; background: var(--track); border-radius: 8px; border: 1px solid #ddd; }
        .p-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); border-radius: 8px; transition: width 1s; }
        
        .runner { position: absolute; top: -35px; transition: left 1s; transform: translateX(-50%); font-size: 28px; animation: run-move 0.6s infinite alternate; }
        .flag { position: absolute; right: 0; top: -20px; font-size: 18px; }

        @keyframes run-move { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-5px); } }

        /* 表單樣式 */
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 850px) {
            .main-layout { flex-direction: column; height: auto; }
            .control-panel { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass treasure-header">
            <span style="font-size: 40px;">💰</span>
            <div style="font-size: 14px; opacity: 0.9;">2026 減肥戰士總獎金</div>
            <div class="prize-amount" id="totalPrize">NT$ 0</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('bmiInfo')">📊 BMI 評估基準 <span>▼</span></button>
                <div id="bmiInfo" class="menu-content active"> <table style="width:100%; font-size:13px; border-collapse: collapse;">
                        <tr style="border-bottom: 1px dashed #eee;"><td>健康範圍</td><td style="text-align:right; color:var(--success); font-weight:bold;">18.5 ~ 24</td></tr>
                        <tr style="border-bottom: 1px dashed #eee;"><td>體重過重</td><td style="text-align:right; color:var(--accent); font-weight:bold;">24 ~ 27</td></tr>
                        <tr><td>輕度肥胖</td><td style="text-align:right; color:var(--danger); font-weight:bold;">27 ~ 30</td></tr>
                    </table>
                    <p style="font-size:11px; color:#999; margin-top:10px;">* 賽事目標不得低於 BMI 18.5。</p>
                </div>
            </div>

            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="真實姓名">
                    <input type="number" id="r_h" placeholder="身高 (cm)">
                    <input type="number" id="r_w" placeholder="初始體重 (kg)">
                    <input type="number" id="r_target" placeholder="目標 BMI (預設24)" value="24">
                    <input type="password" id="r_acc" placeholder="自訂更新帳號 (密碼)">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>

            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重 (限六日) <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="帳號密碼">
                    <input type="number" id="u_w" placeholder="本週體重 (kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">送出更新</button>
                </div>
            </div>

            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminPanel')">🔑 管理者後台 <span>+</span></button>
                <div id="adminPanel" class="menu-content">
                    <div id="adminLoginArea">
                        <input type="password" id="adm_pw" placeholder="管理密碼">
                        <button class="btn-submit" onclick="doAdminLogin()">登入</button>
                    </div>
                    <div id="adminDataArea" style="display:none; font-size:12px;">
                        <div id="playerList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="rankContainer" class="rank-display">
        </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('diet_v2026_final') || '[]');

    function toggleMenu(id) {
        // 單選機制：關閉所有，打開目標
        document.querySelectorAll('.menu-content').forEach(el => {
            if (el.id === id) {
                el.classList.toggle('active');
            } else {
                el.classList.remove('active');
            }
        });
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const w = parseFloat(document.getElementById('r_w').value);
        const tbmi = parseFloat(document.getElementById('r_target').value) || 24;
        const acc = document.getElementById('r_acc').value;

        if(!name || !h || !w || !acc) return alert("請填寫完整");
        
        const targetW = Math.round(((h/100)**2 * tbmi) * 10) / 10;
        players.push({ name, h, sw: w, cw: w, tbmi, target: targetW, acc, progress: 0, last: new Date().toLocaleDateString() });
        save();
        alert("報名成功！");
        toggleMenu('none');
    }

    function doUpdate() {
        const day = new Date().getDay();
        if(day !== 6 && day !== 0) return alert("目前非更新時段（限六、日）");

        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);

        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("驗證失敗");

        p.cw = w;
        p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
        p.last = new Date().toLocaleDateString();
        save();
        alert("更新成功！");
        toggleMenu('none');
    }

    function save() {
        localStorage.setItem('diet_v2026_final', JSON.stringify(players));
        render();
    }

    function render() {
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;

        container.innerHTML = sorted.length ? '' : '<div class="glass" style="padding:40px; text-align:center;">目前尚無勇士參賽</div>';
        
        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="p-info">
                        <div class="p-name">${i === 0 ? '👑 ' : ''}${p.name}</div>
                        <div class="p-percent">${p.progress}%</div>
                        <div style="font-size:11px; color:#999;">目標 BMI: ${p.tbmi}</div>
                    </div>
                    <div class="p-track">
                        <div class="flag">🏁</div>
                        <div class="runner" style="left: ${barW}%">🏃</div>
                        <div class="p-fill" style="width: ${barW}%"></div>
                    </div>
                </div>
            `;
        });
    }

    function doAdminLogin() {
        if(document.getElementById('adm_pw').value === 'gogofit666') {
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminDataArea').style.display = 'block';
            const list = document.getElementById('playerList');
            list.innerHTML = players.map((p, i) => `
                <div style="border-bottom:1px solid #eee; padding:5px 0; display:flex; justify-content:space-between;">
                    <span>${p.name} (${p.cw}kg)</span>
                    <button onclick="delPlayer(${i})" style="color:red; background:none; border:none; cursor:pointer;">刪除</button>
                </div>
            `).join('');
        }
    }
    function delPlayer(i) { if(confirm("確定刪除？")) { players.splice(i, 1); save(); doAdminLogin(); } }

    render();
</script>
</body>
</html>

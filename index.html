<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士挑戰賽</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 10px; }
        .prize-box { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .prize-amount { font-size: 32px; font-weight: bold; }
        
        /* 列表樣式 */
        .rank-card { background: #fff; border: 1px solid #edf2f7; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .player-name { font-weight: bold; font-size: 18px; }
        .progress-text { font-weight: bold; color: var(--accent); }
        
        /* 進度條樣式 */
        .progress-bg { background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; border-radius: 6px; transition: width 1s ease-in-out; }
        
        .admin-panel { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #cbd5e0; display: none; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-toggle { background: #edf2f7; color: #4a5568; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 減肥遊戲挑戰賽</h1>
    <p style="text-align: center; color: #718096; margin-top: -10px;">三個月計畫：邁向 BMI 24 巔峰</p>

    <div class="prize-box">
        <div>目前總獎金池</div>
        <div class="prize-amount" id="totalPrize">NT$ 0</div>
        <div id="participantCount">共 0 人參賽</div>
    </div>

    <div id="rankContainer">
        </div>

    <center><button class="btn-toggle" onclick="toggleAdmin()">管理者後台入口</button></center>

    <div id="adminPanel" class="admin-panel">
        <h3>管理者更新區</h3>
        <div class="input-group">
            <input type="text" id="name" placeholder="姓名">
            <input type="number" id="h" placeholder="身高 (cm)">
            <input type="number" id="sw" placeholder="初始體重 (kg)">
            <input type="number" id="cw" placeholder="本週體重 (kg)">
        </div>
        <button class="btn-add" onclick="saveData()">新增 / 更新數據</button>
        
        <table style="width: 100%; margin-top: 20px; font-size: 12px; text-align: left;">
            <thead><tr><th>姓名</th><th>身高</th><th>初始</th><th>目前</th><th>操作</th></tr></thead>
            <tbody id="adminList"></tbody>
        </table>
    </div>
</div>

<script>
    // 資料獲取與存儲
    let players = JSON.parse(localStorage.getItem('diet_game_data')) || [];

    function saveData() {
        const name = document.getElementById('name').value;
        const h = parseFloat(document.getElementById('h').value);
        const sw = parseFloat(document.getElementById('sw').value);
        const cw = parseFloat(document.getElementById('cw').value);

        if (!name || !h || !sw || !cw) return alert("資料請填寫完整！");

        // BMI 24 計算邏輯
        const target = Math.round(((h / 100) ** 2 * 24) * 10) / 10;
        const progress = ((sw - cw) / (sw - target) * 100).toFixed(1);

        const index = players.findIndex(p => p.name === name);
        if (index > -1) {
            players[index] = { name, h, sw, cw, target, progress };
        } else {
            players.push({ name, h, sw, cw, target, progress });
        }

        localStorage.setItem('diet_game_data', JSON.stringify(players));
        render();
        alert("更新成功！");
    }

    function deletePlayer(index) {
        if (confirm("確定移除這位勇士？")) {
            players.splice(index, 1);
            localStorage.setItem('diet_game_data', JSON.stringify(players));
            render();
        }
    }

    function render() {
        const container = document.getElementById('rankContainer');
        const adminList = document.getElementById('adminList');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);

        // 更新獎金與人數
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        document.getElementById('participantCount').innerText = `共 ${players.length} 人參賽`;

        // 渲染排行榜 (隱藏身高體重)
        container.innerHTML = sorted.length ? '' : '<p style="text-align:center; color:#ccc;">尚無參賽者數據</p>';
        sorted.forEach((p, i) => {
            const barWidth = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-header">
                        <span class="player-name">${i === 0 ? '🥇 ' : ''}${p.name}</span>
                        <span class="progress-text">${p.progress}%</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-bar" style="width: ${barWidth}%"></div>
                    </div>
                </div>
            `;
        });

        // 渲染管理者列表
        adminList.innerHTML = '';
        players.forEach((p, i) => {
            adminList.innerHTML += `
                <tr>
                    <td>${p.name}</td><td>${p.h}</td><td>${p.sw}</td><td>${p.cw}</td>
                    <td><button onclick="deletePlayer(${i})">刪除</button></td>
                </tr>
            `;
        });
    }

    function toggleAdmin() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD 體態健康挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        html { background-color: #0d1117; overscroll-behavior-y: none; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            color: var(--text); overflow-y: auto; padding: 20px 0;
        }

        /* --- 賽後大字報風格 --- */
        #victory-banner {
            display: none; width: 95%; max-width: 1400px; background: linear-gradient(90deg, transparent, rgba(241,196,15,0.15), transparent);
            text-align: center; padding: 30px 0; margin-bottom: 25px; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
            animation: fadeInDown 1.5s ease-out;
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-box { display: inline-block; background: rgba(0,0,0,0.5); border: 1px solid var(--gold); padding: 12px 25px; border-radius: 12px; margin-top: 15px; font-size: 14px; line-height: 1.6; }
        .stat-val { color: var(--gold); font-weight: 900; font-family: monospace; font-size: 18px; }

        /* --- 冠軍卡片特效 --- */
        .winner-card {
            border: 2px solid var(--gold) !important;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.4) !important;
            animation: gold-glow 2s infinite alternate !important;
        }
        @keyframes gold-glow {
            from { box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); transform: scale(1); }
            to { box-shadow: 0 0 30px rgba(241, 196, 15, 0.6); transform: scale(1.01); }
        }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; transition: all 1s ease-in-out;
        }
        @keyframes title-reveal {
            from { opacity: 0; transform: scale(0.8); letter-spacing: 30px; filter: blur(10px); }
            to { opacity: 1; transform: scale(1); letter-spacing: 15px; filter: blur(0); }
        }
        .animate-title { animation: title-reveal 2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        .intro-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer;
            backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s;
        }
        .intro-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); }

        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; min-height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }
        .glass { background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0; }
        .sync-style-text { font-size: 10px; color: rgba(255, 255, 255, 0.5); white-space: nowrap; }
        #musicControl { cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .menu-trigger { width: 100%; padding: 15px 20px; background: transparent; border: none; text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 85vh; overflow-y: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 10px; }
        .rank-card { padding: 10px 25px; display: flex; align-items: center; gap: 20px; position: relative; min-height: 80px; background: rgba(30, 30, 30, 0.3); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .p-info { flex: 0 0 180px; }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; transform: scaleX(-1); }
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-8px) scaleX(-1); } }
        .final-badge { background: var(--gold); color: #000; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; }

        @media (max-width: 850px) {
            .main-layout { flex-direction: column; align-items: center; }
            .control-panel { width: 100%; position: relative; }
            .p-info { flex: 0 0 120px; }
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div style="position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 10001;">
        <button class="intro-btn" onclick="toggleMusic()" id="introMusicBtn">🔊 Music: OFF</button>
        <button class="intro-btn" style="border-color: var(--gold); color: var(--gold);" onclick="closeIntro()">SKIP ❯❯</button>
    </div>
    <div style="text-align: center;">
        <h1 id="intro-title" style="font-size: 80px; font-weight: 900; color: var(--gold); margin: 0; opacity: 0;">ASGARD</h1>
        <p id="intro-sub" style="color: rgba(255,255,255,0.4); letter-spacing: 10px; margin-top: 10px; opacity: 0;">BODY TRANSFORMATION 2026</p>
    </div>
    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1);">
        <div id="intro-bar" style="width: 0%; height: 100%; background: var(--gold); transition: width 5s linear;"></div>
    </div>
</div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div id="victory-banner">
    <div style="font-size: 14px; color: var(--gold); letter-spacing: 5px; font-weight: bold;">CHAMPION REVEALED</div>
    <div id="winner-announcement" style="font-size: 36px; font-weight: 900; color: #fff; margin: 10px 0;">恭喜 👑 <span id="winner-name">---</span> 奪得總冠軍！</div>
    <div class="stat-box">
        結算公式：<b>(Δ肌肉% × 200) + (Δ脂肪% × 100)</b><br>
        <span id="winner-stats-detail" style="font-size: 13px; opacity: 0.8;">計算中...</span>
    </div>
    <div style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 20px;">2026 ASGARD 體態健康挑戰賽 · 圓滿結束</div>
</div>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px;" onclick="syncFromGitHub()">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div id="musicControl" onclick="event.stopPropagation(); toggleMusic()">
                    <span id="musicToggle">🔇</span> 
                    <span id="musicStatusText" class="sync-style-text">點擊開啟背景音樂</span>
                </div>
                <span style="font-size: 13px; font-weight: bold; color: #fff;">自動同步中 🔄</span>
            </div>
            <div id="syncTime" class="sync-style-text" style="text-align: right;">最後同步：等待中...</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold;">2026Y ASGARD 總獎金池</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div id="forms-container" class="glass"> 
            <div id="active-forms">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <input type="number" id="r_waist" placeholder="初始腰圍(吋)">
                    <input type="number" id="r_smm" placeholder="初始肌肉 SMM(kg)">
                    <input type="number" id="r_fat_kg" placeholder="初始脂肪重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24 | 健康層級</option>
                        <option value="22">目標 BMI 22 | 精實層級</option>
                        <option value="20">目標 BMI 20 | 極致層級</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="設定更新密碼">
                    <button style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="doRegister()">確認報名</button>
                </div>

                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新紀錄 / 結算 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="輸入密碼">
                    <input type="number" id="u_w" placeholder="體重(kg)">
                    <input type="number" id="u_waist" placeholder="腰圍(吋)">
                    <div id="finalArea" style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); opacity:0.5">
                        <input type="number" id="u_smm" placeholder="最終肌肉量(kg)" disabled>
                        <input type="number" id="u_fat_kg" placeholder="最終脂肪重(kg)" disabled>
                        <input type="text" id="u_img" placeholder="InBody照片連結" disabled>
                    </div>
                    <button style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="doUpdate()">同步數據</button>
                </div>
            </div>

            <div id="locked-msg" style="display:none; padding: 30px 20px; text-align: center; color: var(--gold);">
                <div style="font-size: 40px; margin-bottom: 10px;">🔒</div>
                <div style="font-weight: bold;">賽事已圓滿結束</div>
                <div style="font-size: 12px; opacity: 0.6; margin-top: 5px;">數據已鎖定，明年見！</div>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者 <span>+</span></button>
            <div id="adminForm" class="menu-content">
                <input type="password" id="adm_pw" placeholder="管理者密鑰">
                <button style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;" onclick="doAdminLogin()">管理模式</button>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "2026-04-13" };
    let fileSha = "";
    let isEnded = false;

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "2026-04-13" };
            
            checkStatus();
            renderList();
            updateCountdown();
            document.getElementById('syncTime').innerText = `最後同步：${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error(e); }
    }

    function checkStatus() {
        const end = new Date(period.end + "T23:59:59").getTime();
        const now = new Date().getTime();
        isEnded = now > end;

        // 結束後邏輯
        if (isEnded) {
            document.getElementById('active-forms').style.display = 'none';
            document.getElementById('locked-msg').style.display = 'block';
            document.getElementById('victory-banner').style.display = 'block';
        }

        // 結算日逻辑 (最後 24 小時)
        const isFinalDay = (end - now < 86400000 && end - now > 0);
        const area = document.getElementById('finalArea');
        if (area) {
            area.style.opacity = isFinalDay ? "1" : "0.5";
            area.querySelectorAll('input').forEach(i => i.disabled = !isFinalDay);
        }
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        
        if(isEnded && sorted.length > 0) {
            const p = sorted[0];
            document.getElementById('winner-name').innerText = p.name;
            const smmUp = (((p.csmm - p.ssmm) / p.ssmm) * 100).toFixed(1);
            const fatDown = (((p.sfat - p.cfat) / p.sfat) * 100).toFixed(1);
            document.getElementById('winner-stats-detail').innerHTML = 
                `肌肉成長：<span class="stat-val">${smmUp}%</span> ｜ 脂肪減少：<span class="stat-val">${fatDown}%</span> ｜ 總決算分：<span class="stat-val">${p.progress}</span>`;
            if(!window.hasRained) { makeItRain(); window.hasRained = true; }
        }

        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(parseFloat(p.progress) || 0, 0), 100);
            const isWinner = isEnded && i === 0;
            return `
                <div class="rank-card ${isWinner ? 'winner-card' : ''}">
                    <div style="font-size: 24px; font-weight: 900; color: ${isWinner ? 'var(--gold)' : 'rgba(255,255,255,0.3)'}; width: 45px; text-align:center;">
                        ${isWinner ? '🏆' : (i + 1)}
                    </div>
                    <div class="p-info">
                        <div style="font-size: 18px; font-weight: bold;">
                            ${p.name}${p.isFinal ? '<span class="final-badge">結算完成</span>' : ''}
                        </div>
                        <div style="font-size: 11px; opacity: 0.5;">${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${isWinner ? 'var(--gold)' : '#27ae60'};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-emoji">${isWinner ? '🥇' : '🏃'}</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // 基礎功能
    function closeIntro() {
        document.getElementById('intro-overlay').style.opacity = "0";
        setTimeout(() => document.getElementById('intro-overlay').remove(), 1000);
    }
    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }
    function makeItRain() {
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#f1c40f', '#fff'] });
    }
    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }
    function updateCountdown() {
        const target = new Date(period.end + "T23:59:59").getTime();
        const distance = target - new Date().getTime();
        if (distance < 0) { document.getElementById('ddayDisplay').innerText = "挑戰已結束"; return; }
        const d = Math.floor(distance / 86400000);
        const h = Math.floor((distance % 86400000) / 3600000);
        const m = Math.floor((distance % 3600000) / 60000);
        const s = Math.floor((distance % 60000) / 1000);
        document.getElementById('ddayDisplay').innerText = `${d}D ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    window.onload = () => {
        setTimeout(() => document.getElementById('intro-title').classList.add('animate-title'), 200);
        setTimeout(() => document.getElementById('intro-sub').style.opacity = "1", 1000);
        setTimeout(() => document.getElementById('intro-bar').style.width = "100%", 100);
        syncFromGitHub();
        setInterval(syncFromGitHub, 30000);
        setInterval(updateCountdown, 1000);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden;
        }
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; height: 85vh; align-items: flex-start; }
        
        /* 左側控制面板 */
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .glass { 
            background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        
        /* 選單邏輯 */
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 400px; padding: 15px 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        /* 右側排行榜：關鍵修復區 */
        .rank-display { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
        .rank-card { 
            padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; 
            min-height: 100px; background: rgba(40, 40, 40, 0.5) !important;
        }
        .p-info { flex: 0 0 140px; }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 40px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        
        /* 小人與速度動畫 */
        .runner-box { position: absolute; top: -48px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 28px; animation: bounce linear infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        
        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        
        /* 滾動條美化 */
        .rank-display::-webkit-scrollbar { width: 6px; }
        .rank-display::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">點擊開啟背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer; display: inline-block; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 挑戰賽獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <select id="r_target_bmi" style="width:100%; padding:10px; margin-bottom:10px; background:rgba(255,255,255,0.1); color:#fff; border-radius:8px;">
                        <option value="24">目標 BMI 24</option>
                        <option value="22">目標 BMI 22</option>
                        <option value="20">目標 BMI 20</option>
                    </select>
                    <button style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" placeholder="姓名">
                    <input type="password" placeholder="輸入密碼">
                    <input type="number" placeholder="今日體重(kg)">
                    <button style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <input type="password" placeholder="管理者密鑰">
                    <button style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">進入管理模式</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="rankContainer" class="rank-display">
        <div style="text-align:center; padding: 50px; opacity: 0.5;">正在載入參賽者排名...</div>
    </div>
</div>

<script>
    // 預設數據 (確保在 JSON 讀取失敗時也能看到東西)
    let players = [
        { name: "哇啊", progress: 100, initial_w: 80, target_w: 70, last_upd: "2026/04/09 12:51 AM" },
        { name: "奶油", progress: 81.2, initial_w: 65, target_w: 72, last_upd: "2026/04/09 12:33 AM" },
        { name: "迪西", progress: 27.2, initial_w: 90, target_w: 75, last_upd: "2026/04/09 12:24 AM" },
        { name: "黃先生", progress: 17.6, initial_w: 85, target_w: 70, last_upd: "2026/04/09 12:18 AM" },
        { name: "芸芸醬", progress: 1.6, initial_w: 55, target_w: 50, last_upd: "2026/04/08 11:06 PM" }
    ];

    function makeItRain() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f1c40f', '#e67e22', '#ffffff'] });
        const bag = document.getElementById('moneyBag');
        bag.style.transform = 'scale(1.3)';
        setTimeout(() => bag.style.transform = 'scale(1)', 100);
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        // 先把所有都關掉 (一次只開一個)
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        // 如果原本是關的，就打開
        if (!isOpen) target.classList.add('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        const prizeDisplay = document.getElementById('totalPrize');
        
        // 更新獎金 (範例：人數 * 500)
        prizeDisplay.innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const isLosing = p.target_w < p.initial_w;
            
            // 關鍵：速度隨進度變快 (100% 時動畫週期 0.15s, 0% 時 0.6s)
            const speed = 0.6 - (barW / 100 * 0.45);
            const color = barW >= 80 ? '#27ae60' : (barW >= 40 ? '#f39c12' : '#e74c3c');

            return `
                <div class="glass rank-card">
                    <div style="font-size: 24px; font-weight: 900; color: var(--gold); width: 30px;">${i + 1}</div>
                    <div class="p-info">
                        <div style="font-size: 18px; font-weight: bold;">
                            ${i === 0 ? '👑 ' : ''}${p.name}
                            <span class="bmi-tag ${isLosing ? 'tag-lose' : 'tag-gain'}">${isLosing ? '減重' : '增重'}</span>
                        </div>
                        <div style="font-size: 11px; opacity: 0.6; margin-top: 5px;">更新: ${p.last_upd}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 15px ${color}66;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <div style="font-size: 10px; font-weight: bold; margin-bottom: 2px;">${barW}%</div>
                            <span class="runner-emoji" style="animation-duration: ${speed}s">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // 初始化執行
    window.onload = () => {
        renderList();
        // 倒數計時範例
        setInterval(() => {
            document.getElementById('ddayDisplay').innerText = "04D 21:35:03";
        }, 1000);
    };
</script>
</body>
</html>

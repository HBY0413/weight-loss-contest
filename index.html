<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 專業穩定版</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --track: #edf2f7; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?q=80&w=2000'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 85vh; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-family: 'Courier New', Courier, monospace; font-weight: bold; border-top: 1px solid #333; }
        .menu-item { border-bottom: 1px solid #eee; }
        .menu-trigger { width: 100%; padding: 18px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #fff; }
        .menu-content.active { max-height: 800px; padding: 20px; border-top: 1px solid #f1f1f1; }
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 10px; }
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.5); transition: transform 0.3s; }
        .rank-card:hover { transform: translateY(-5px); }
        .p-info { flex: 0 0 150px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-percent { font-size: 24px; font-weight: 900; }
        .p-track { flex: 1; position: relative; height: 16px; background: var(--track); border-radius: 8px; margin-top: 15px; }
        .p-fill { height: 100%; border-radius: 8px; transition: width 1s, background-color 0.5s; }
        .runner { position: absolute; top: -38px; transition: left 1s; transform: translateX(-50%) scaleX(-1); font-size: 32px; animation: run-move 0.6s infinite alternate; }
        .target-label { position: absolute; right: 0; top: -25px; font-size: 11px; color: var(--accent); font-weight: bold; white-space: nowrap; }
        .update-time { font-size: 10px; color: #999; margin-top: 4px; }
        @keyframes run-move { from { transform: translateX(-50%) scaleX(-1) translateY(0); } to { transform: translateX(-50%) scaleX(-1) translateY(-6px); } }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        .btn-submit:hover { opacity: 0.9; }
        .sync-status { font-size: 10px; color: #999; text-align: center; padding: 5px; background: rgba(0,0,0,0.05); }
        .arrow { transition: transform 0.3s; font-size: 12px; }
        .active-arrow { transform: rotate(180deg); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <span style="font-size: 40px;">💰</span>
                <div style="font-size: 12px; opacity: 0.9;">2026 減肥戰士總獎金</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #1a253a; color: #fff; font-size: 11px; text-align: center; padding: 8px 0; opacity: 0.8;">讀取賽期中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div class="sync-status" id="syncStatus">☁️ 正在連線至 GitHub...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('bmiInfo')">📊 BMI 評估基準 <span class="arrow">▼</span></button>
                <div id="bmiInfo" class="menu-content active">
                    <table style="width:100%; font-size:13px;">
                        <tr style="height:30px;"><td>健康範圍</td><td style="text-align:right; color:var(--success); font-weight:bold;">18.5 ~ 24</td></tr>
                        <tr style="height:30px;"><td>體重過重</td><td style="text-align:right; color:var(--accent); font-weight:bold;">24 ~ 27</td></tr>
                    </table>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span class="arrow">+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="真實姓名">
                    <input type="number" id="r_h" placeholder="身高 (cm)">
                    <input type="number" id="r_w" placeholder="初始體重 (kg)">
                    <label style="font-size: 11px; color: #666; padding-left: 4px;">目標 BMI 級距：</label>
                    <select id="r_target_bmi">
                        <option value="24">24.0 (健康上限)</option>
                        <option value="23">23.0 (精實)</option>
                        <option value="22">22.0 (黃金比例)</option>
                        <option value="21">21.0</option>
                        <option value="20">20.0</option>
                        <option value="18.5">18.5 (健康下限)</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="自訂更新密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重記錄 <span class="arrow">+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="密碼">
                    <input type="number" id="u_w" placeholder="今日體重 (kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據到 GitHub</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminPanel')">🔑 管理者與賽期設定 <span class="arrow">+</span></button>
                <div id="adminPanel" class="menu-content">
                    <div id="adminLoginArea">
                        <input type="password" id="adm_pw" placeholder="管理密碼">
                        <button class="btn-submit" onclick="doAdminLogin()">登入</button>
                    </div>
                    <div id="adminDataArea" style="display:none;">
                        <label style="font-size:12px;">設定賽期：</label>
                        <input type="date" id="set_start">
                        <input type="date" id="set_end">
                        <button class="btn-submit" style="background:#e67e22;" onclick="savePeriod()">儲存並上傳</button>
                        <div id="playerList" style="font-size:12px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413',
        repo: 'weight-loss-contest',
        path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };
    let fileSha = "";

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            if (!res.ok) throw new Error('Sync Failed');
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            renderList();
            document.getElementById('syncStatus').innerText = `✅ 最後雲端同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            document.getElementById('syncStatus').innerText = "❌ 同步失敗，請檢查網路";
        }
    }

    async function pushToGitHub() {
        document.getElementById('syncStatus').innerText = "📤 正在寫入 GitHub...";
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Auto Sync", content, sha: fileSha })
            });
            const result = await res.json();
            fileSha = result.content.sha;
            syncFromGitHub(); // 成功後立刻刷一次資料
        } catch (e) { alert("上傳失敗"); }
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => {
            el.classList.remove('active');
            el.previousElementSibling.querySelector('.arrow').classList.remove('active-arrow');
        });
        if (!isOpen) {
            target.classList.add('active');
            target.previousElementSibling.querySelector('.arrow').classList.add('active-arrow');
        }
    }

    function getProgressColor(progress) {
        const p = parseFloat(progress);
        if (p >= 80) return '#27ae60'; // 綠
        if (p >= 50) return '#f39c12'; // 橘
        return '#e74c3c';             // 紅
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.length ? '' : '<div class="glass" style="padding:40px; text-align:center;">目前尚無戰士報名</div>';
        
        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const barColor = getProgressColor(p.progress);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="p-info">
                        <div class="p-name">${i === 0 ? '👑 ' : ''}${p.name}</div>
                        <div class="p-percent" style="color: ${barColor}">${p.progress}%</div>
                        <div class="update-time">最後更新: ${p.lastUpdate || '尚未更新'}</div>
                    </div>
                    <div class="p-track">
                        <div class="target-label">目標 BMI: ${p.tbmi} 🏁</div>
                        <div class="runner" style="left: ${barW}%">🏃</div>
                        <div class="p-fill" style="width: ${barW}%; background: ${barColor};"></div>
                    </div>
                </div>`;
        });
    }

    function updateCountdown() {
        const dDisp = document.getElementById('ddayDisplay');
        const pDisp = document.getElementById('periodDisplay');
        if(!period.start || !period.end) return;

        pDisp.innerText = `賽期：${period.start} ~ ${period.end}`;
        const now = new Date();
        const start = new Date(period.start + " 00:00:00");
        const end = new Date(period.end + " 23:59:59");

        let target = null, prefix = "";
        if (now < start) { target = start; prefix = "距開賽還有 "; }
        else if (now <= end) { target = end; prefix = "剩餘賽程："; }

        if (target) {
            const diff = target - now;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            dDisp.innerText = `${prefix}${d}D ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        } else {
            dDisp.innerText = "本期賽事已結束";
        }
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        const tbmi = parseFloat(document.getElementById('r_target_bmi').value);
        const acc = document.getElementById('r_acc').value;
        if(!name || !h || !sw || !acc) return alert("資訊不完整");
        
        const targetW = Math.round(((h/100)**2 * tbmi) * 10) / 10;
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        players.push({ name, h, sw, cw: sw, tbmi, target: targetW, acc, progress: 0, lastUpdate: timeStr });
        pushToGitHub();
        toggleMenu('none');
    }

    function doUpdate() {
        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("姓名或密碼錯誤");
        
        const now = new Date();
        p.lastUpdate = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        p.cw = w;
        p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
        pushToGitHub();
        toggleMenu('none');
    }

    function doAdminLogin() {
        if(document.getElementById('adm_pw').value === 'gogofit666') {
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminDataArea').style.display = 'block';
            renderAdmin();
        } else alert("管理密碼錯誤");
    }

    function renderAdmin() {
        const list = document.getElementById('playerList');
        list.innerHTML = '<strong>管理名單：</strong>' + players.map((p, i) => `
            <div style="display:flex; justify-content:space-between; margin-top:5px;">
                <span>${p.name} (目標:${p.tbmi})</span>
                <button onclick="delPlayer(${i})" style="color:white; background:var(--danger); border:none; border-radius:4px; padding:2px 5px; cursor:pointer;">刪除</button>
            </div>`).join('');
    }

    function delPlayer(i) {
        if(confirm("確定刪除嗎？")) { players.splice(i, 1); pushToGitHub(); renderAdmin(); }
    }

    function savePeriod() {
        period.start = document.getElementById('set_start').value;
        period.end = document.getElementById('set_end').value;
        pushToGitHub();
    }

    window.onload = () => {
        syncFromGitHub();
        setInterval(updateCountdown, 1000); // 每一秒跑一次本地倒數 (Safe)
    };
    setInterval(syncFromGitHub, 60000); // 每 60 秒跑一次網路同步 (Secure)
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('jpg.jpeg'); 
            background-size: cover; background-position: center;
            height: 100vh; overflow: hidden; color: var(--text);
            display: flex; justify-content: center; align-items: center;
        }
        
        .main-layout { 
            display: flex; gap: 25px; width: 95%; max-width: 1400px; 
            height: 90vh; align-items: stretch; 
        }
        
        /* 左側控制面板：修正為可捲動且不切掉內容 */
        .control-panel { 
            flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; 
            overflow-y: auto; padding-right: 5px;
        }
        /* 美化捲軸 */
        .control-panel::-webkit-scrollbar { width: 4px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .glass { 
            background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            flex-shrink: 0; overflow: hidden;
        }
        
        .music-bar { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; height: 50px; box-sizing: border-box; }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* 確保選單展開時內容不被裁切 */
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 1000px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); overflow-y: visible; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        /* 使用者名單樣式 */
        .user-list-box {
            margin-top: 10px; background: rgba(0,0,0,0.3); border-radius: 10px;
            max-height: 200px; overflow-y: auto; padding: 5px 10px;
        }
        .user-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .user-item:last-child { border-bottom: none; }
        .remove-btn { color: #ff4d4d; font-size: 11px; cursor: pointer; border: 1px solid #ff4d4d; padding: 2px 5px; border-radius: 4px; }

        .rank-display { 
            flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 8px;
        }
        
        .rank-card { 
            padding: 15px 25px; display: flex; align-items: center; gap: 20px; position: relative; 
            min-height: 100px; background: rgba(30, 30, 30, 0.3) !important; 
            backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
        }
        
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        .rank-display::-webkit-scrollbar { width: 6px; }
        .rank-display::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass music-bar" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">點擊開啟背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 挑戰賽獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="text-align:center; padding: 8px; font-size: 11px; color: rgba(255,255,255,0.6);">期間：未設定 ~ 2026-04-13</div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass" style="flex-grow: 1;"> 
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高(cm)">
                <input type="number" id="r_w" placeholder="初始體重(kg)">
                <select id="r_target_bmi">
                    <option value="24">目標 BMI 24</option>
                    <option value="22">目標 BMI 22</option>
                    <option value="20">目標 BMI 20</option>
                </select>
                <input type="password" id="r_acc" placeholder="設定更新密碼">
                <button onclick="doRegister()" style="width:100%; padding:10px; background:var(--primary); color:white; border-radius:8px; cursor:pointer;">確認報名</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="輸入密碼">
                <input type="number" id="u_w" placeholder="今日體重(kg)">
                <button onclick="doUpdate()" style="width:100%; padding:10px; background:var(--success); color:white; border-radius:8px; cursor:pointer;">同步數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
            <div id="adminForm" class="menu-content">
                <div style="font-size: 12px; margin-bottom: 5px;">賽期設定：</div>
                <input type="date" id="start_date">
                <input type="date" id="end_date">
                
                <div style="font-size: 12px; margin-top: 15px; margin-bottom: 5px; color: var(--gold);">目前參賽名單：</div>
                <div id="userList" class="user-list-box">
                    </div>
                
                <button onclick="saveAdmin()" style="width:100%; padding:10px; margin-top:15px; background:var(--accent); color:white; border-radius:8px; cursor:pointer;">儲存設定</button>
            </div>
        </div>
    </div>
    
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 在你的 renderList 函式中，順便調用這個來更新左側名單
    function renderUserList() {
        const listContainer = document.getElementById('userList');
        listContainer.innerHTML = players.map(p => `
            <div class="user-item">
                <span style="font-size:13px;">${p.name}</span>
                <span class="remove-btn" onclick="removeUser('${p.name}')">[移除]</span>
            </div>
        `).join('');
    }

    // 記得在 renderList() 結尾加上 renderUserList();
    // 其餘邏輯保持不變...
</script>
</body>
</html>

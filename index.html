<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; 
            min-height: 100vh;
            display: flex; align-items: flex-start; 
            justify-content: center; color: var(--text); 
            overflow-y: auto;
            padding: 20px 0;
        }
        
        .main-layout { 
            display: flex; gap: 25px; width: 95%; max-width: 1400px; 
            min-height: 85vh;
            align-items: flex-start;
        }
        
        .control-panel { 
            flex: 0 0 320px; 
            display: flex; flex-direction: column; gap: 15px; 
            position: sticky; top: 20px; 
        }

        .glass { 
            background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            overflow: hidden; flex-shrink: 0;
        }

        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-content { 
            max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); 
        }
        .menu-content.active { 
            max-height: 85vh; 
            overflow-y: auto;  
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .formula-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 12px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }
        .formula-box b { color: var(--gold); }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 10px; }
        
        .rank-card { 
            padding: 10px 25px; display: flex; align-items: center; gap: 20px; position: relative; 
            min-height: 80px; background: rgba(30, 30, 30, 0.3) !important; 
            backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .p-info { flex: 0 0 180px; }
        .rank-trend { font-size: 12px; font-weight: bold; margin-left: 5px; }
        .trend-up { color: #2ecc71; }
        .trend-down { color: #e74c3c; }
        .trend-none { color: #95a5a6; }

        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        
        /* 修正：將跑步小人水平翻轉，使其向右跑 */
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; transform: scaleX(-1); }
        
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-8px) scaleX(-1); } }
        
        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        .target-bmi-label { position: absolute; right: 0; top: -20px; font-size: 11px; color: var(--gold); opacity: 0.9; font-weight: bold; }
    </style>
</head>

                <input type="password" id="r_acc" placeholder="設定更新密碼">

            <div id="updForm" class="menu-content">

                <input type="password" id="u_acc" placeholder="輸入密碼">
                <input type="number" id="u_w" placeholder="今日體重(kg)">
                <button id="updBtn" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doUpdate()">同步數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
            <div id="adminForm" class="menu-content">

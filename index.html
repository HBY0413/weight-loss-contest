<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士排行榜</title>
    <style>
        /* 完全保留你原本的 CSS 樣式 */
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?q=80&w=2000'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; padding-bottom: 20px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 15px; }
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.5); position: relative; min-height: 100px; }
        .rank-number { flex: 0 0 50px; text-align: center; font-size: 24px; font-weight: 900; color: var(--primary); }
        .p-info { flex: 0 0 130px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-track { flex: 1; position: relative; height: 14px; background: rgba(51, 51, 51, 0.15); border-radius: 7px; margin-top: 42px; border: 1px solid rgba(0,0,0,0.05); }
        .p-fill { height: 100%; border-radius: 7px; transition: width 1s ease-in-out; position: absolute; left: 0; top: 0; z-index: 1; }
        .runner-box { position: absolute; top: -54px; transition: left 1s ease-in-out; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .runner-emoji { font-size: 30px; transform: scaleX(-1); line-height: 1; animation: bounce 0.5s infinite alternate linear; }
        .runner-percent { font-size: 12px; font-weight: 900; background: rgba(255,255,255,0.9); padding: 1px 6px; border-radius: 10px; margin-bottom: -2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        @keyframes bounce { from { transform: scaleX(-1) translateY(0); } to { transform: scaleX(-1) translateY(-6px); } }
        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: #fff; }
        .menu-content.active { max-height: 1000px; padding: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <span style="font-size: 40px;">💰</span>
                <div style="font-size: 12px; opacity: 0.9;">2026 減肥戰士獎金池</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div class="timer-box" id="ddayDisplay">計算中...</div>
        </div>

        <div class="glass">
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高(cm)">
                <input type="number" id="r_w" placeholder="初始體重(kg)">
                <div style="font-size: 11px; color: #666; margin: 5px 0;">系統將依據 BMI 18.5~24 自動設定目標</div>
                <input type="password" id="r_acc" placeholder="建立更新密碼">
                <button class="btn-submit" onclick="doRegister()">確認報名</button>
            </div>
            
            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="密碼">
                <input type="number" id="u_w" placeholder="今日體重(kg)">
                <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
            </div>
        </div>
    </div>

    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // GitHub API 配置
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let fileSha = "";

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            players = JSON.parse(decodeURIComponent(escape(atob(data.content)))).players || [];
            renderList();
        } catch (e) { console.error("同步失敗"); }
    }

    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players }))));
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT", headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update Data", content, sha: fileSha })
        });
        syncFromGitHub();
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = '';
        
        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const isOver = p.sw > p.target;
            const color = isOver ? 'var(--accent)' : '#3498db';
            
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-number">${i + 1}</div>
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div style="font-size:10px; color:#999;">目標: ${p.target}kg (BMI ${p.tbmi})</div>
                        <div style="font-size:10px; color:#666;">初始: ${p.sw}kg | 現重: ${p.cw}kg</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="color:${color}">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        const acc = document.getElementById('r_acc').value;
        if(!name || !h || !sw) return alert("請填寫完整");

        // 智慧判定目標 BMI
        const currentBMI = sw / ((h/100)**2);
        let targetBMI = currentBMI > 24 ? 24 : (currentBMI < 18.5 ? 18.5 : currentBMI);
        const targetW = Math.round(targetBMI * (h/100)**2 * 10) / 10;

        players.push({ 
            name, h, sw, cw: sw, 
            target: targetW, tbmi: targetBMI.toFixed(1),
            acc, progress: "0.0" 
        });
        pushToGitHub(); toggleMenu('none');
    }

    function doUpdate() {
        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("驗證失敗");
        
        p.cw = w; 
        const initialGap = Math.abs(p.sw - p.target);
        const currentGap = Math.abs(w - p.target);

        let prog = initialGap === 0 ? 100 : (1 - (currentGap / initialGap)) * 100;
        
        // 方向判定：如果離目標越來越遠（例如減重變胖），進度變負值
        if ((p.sw > p.target && w > p.sw) || (p.sw < p.target && w < p.sw)) {
            prog = -Math.abs((w - p.sw) / initialGap * 100);
        }
        
        p.progress = prog.toFixed(1);
        pushToGitHub(); toggleMenu('none');
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target ? target.classList.contains('active') : false;
        document.querySelectorAll('.menu-content').forEach(el => { el.classList.remove('active'); el.style.maxHeight = "0"; });
        if (target && !isOpen) { target.classList.add('active'); target.style.maxHeight = "800px"; }
    }

    syncFromGitHub();
</script>
</body>
</html>

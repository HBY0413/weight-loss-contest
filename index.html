<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD 體態健康挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        
        html { background-color: #0d1117; overscroll-behavior-y: none; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; 
            min-height: 100vh; display: flex; align-items: flex-start; 
            justify-content: center; color: var(--text); overflow-y: auto; padding: 20px 0;
        }
        
        /* --- 開場動畫樣式 --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; transition: all 1s ease-in-out;
        }
        @keyframes title-reveal {
            from { opacity: 0; transform: scale(0.8); letter-spacing: 30px; filter: blur(10px); }
            to { opacity: 1; transform: scale(1); letter-spacing: 15px; filter: blur(0); }
        }
        .animate-title { animation: title-reveal 2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        .intro-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer;
            backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s;
        }
        .intro-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); }

        /* 主佈局樣式 */
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; min-height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }
        .glass { background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0; }
        .sync-style-text { font-size: 10px; color: rgba(255, 255, 255, 0.5); white-space: nowrap; }
        #musicControl { cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; gap: 8px; }
        #musicControl:hover { opacity: 0.8; }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .menu-trigger { width: 100%; padding: 15px 20px; background: transparent; border: none; text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 85vh; overflow-y: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .formula-box { background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 12px; line-height: 1.6; color: rgba(255, 255, 255, 0.8); border: 1px dashed rgba(255, 255, 255, 0.2); }
        .formula-box b { color: var(--gold); }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        input:disabled { opacity: 0.3; cursor: not-allowed; }
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 10px; }
        .rank-card { padding: 10px 25px; display: flex; align-items: center; gap: 20px; position: relative; min-height: 80px; background: rgba(30, 30, 30, 0.3) !important; backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .p-info { flex: 0 0 180px; }
        .rank-trend { font-size: 12px; font-weight: bold; margin-left: 5px; }
        .trend-up { color: #2ecc71; }
        .trend-down { color: #e74c3c; }
        .trend-none { color: #95a5a6; }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; transform: scaleX(-1); }
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-8px) scaleX(-1); } }
        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        .target-bmi-label { position: absolute; right: 0; top: -20px; font-size: 11px; color: var(--gold); opacity: 0.9; font-weight: bold; }
        .final-badge { background: var(--gold); color: #000; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; vertical-align: middle; }

        /* --- 抓狂一族風格動畫區 --- */
        #runner-animation-box {
            position: relative; padding: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 180px;
            margin-top: 0px; overflow: hidden; border: 2px solid var(--gold);
        }
        .animation-title {
            position: absolute; top: 10px; width: 100%; text-align: center;
            font-size: 14px; font-weight: 900; color: #ff3300; 
            text-shadow: 2px 2px 0px #fff; z-index: 10;
        }
        /* 抓狂震動特效 */
        @keyframes agitated-shake {
            0% { transform: translate(0,0) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(2px, 0px) rotate(1deg); }
            30% { transform: translate(-2px, 2px) rotate(0deg); }
            40% { transform: translate(2px, 2px) rotate(-1deg); }
            50% { transform: translate(-2px, -2px) rotate(1deg); }
            60% { transform: translate(2px, 0px) rotate(0deg); }
            70% { transform: translate(-2px, 2px) rotate(-1deg); }
            80% { transform: translate(2px, -2px) rotate(1deg); }
            90% { transform: translate(-2px, 0px) rotate(0deg); }
            100% { transform: translate(2px, 2px) rotate(-1deg); }
        }
        /* 瘋狂閃爍發光 */
        @keyframes crazy-glow {
            from { filter: drop-shadow(0 0 5px #ff0000) contrast(1.2); }
            to { filter: drop-shadow(0 0 20px #ffcc00) contrast(1.5); }
        }
        .funny-runner {
            width: 130px; height: auto; z-index: 5;
            animation: agitated-shake 0.15s infinite, crazy-glow 0.1s infinite alternate;
        }
        /* 背景跑馬燈文字 */
        .bg-text-stream {
            position: absolute; font-size: 60px; font-weight: 900; color: rgba(255,255,255,0.03);
            white-space: nowrap; pointer-events: none; z-index: 1;
            animation: stream-move 1s linear infinite;
        }
        @keyframes stream-move { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div style="position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 10001;">
        <button class="intro-btn" onclick="toggleMusic()" id="introMusicBtn">🔊 Music: OFF</button>
        <button class="intro-btn" style="border-color: var(--gold); color: var(--gold);" onclick="closeIntro()">SKIP ❯❯</button>
    </div>
    <div style="text-align: center;">
        <h1 id="intro-title" style="font-size: 80px; font-weight: 900; color: var(--gold); margin: 0; opacity: 0; filter: drop-shadow(0 0 20px rgba(241,196,15,0.5));">ASGARD</h1>
        <p id="intro-sub" style="color: rgba(255,255,255,0.4); letter-spacing: 10px; margin-top: 10px; opacity: 0; transition: 1s;">BODY TRANSFORMATION 2026</p>
    </div>
    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1);">
        <div id="intro-bar" style="width: 0%; height: 100%; background: var(--gold); transition: width 5s linear;"></div>
    </div>
</div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px;" onclick="syncFromGitHub()">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div id="musicControl" onclick="event.stopPropagation(); toggleMusic()">
                    <span id="musicToggle">啟動</span> 
                    <span id="musicStatusText" class="sync-style-text">點擊開啟音樂</span>
                </div>
                <span style="font-size: 13px; font-weight: bold; color: #fff;">30s 同步中 🔄</span>
            </div>
            <div id="syncTime" class="sync-style-text" style="text-align: right;">最後同步：等待中...</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer; display: inline-block; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="text-align:center; padding: 8px; font-size: 11px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);">期間：未設定 ~ 2026-04-13</div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass"> 
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高(cm)">
                <input type="number" id="r_w" placeholder="初始體重(kg)">
                <input type="number" id="r_f" placeholder="初始體脂(%)">
                <select id="r_target_bmi">
                    <option value="24">目標 BMI 24</option>
                    <option value="22">目標 BMI 22</option>
                    <option value="20">目標 BMI 20</option>
                </select>
                <input type="password" id="r_acc" placeholder="更新密碼">
                <button id="regBtn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="doRegister()">確認報名</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="輸入密碼">
                <input type="number" id="u_w" placeholder="今日體重(kg)">
                <div id="finalArea" style="opacity:0.5">
                    <input type="number" id="u_f" placeholder="今日體脂率(%)" disabled>
                    <input type="text" id="u_img" placeholder="InBody照片連結" disabled>
                </div>
                <button id="updBtn" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px;" onclick="doUpdate()">同步數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者 <span>+</span></button>
            <div id="adminForm" class="menu-content">
                <div id="adminLoginSection">
                    <input type="password" id="adm_pw" placeholder="密鑰">
                    <button style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;" onclick="doAdminLogin()">管理模式</button>
                </div>
                <div id="adminDataArea" style="display:none; margin-top:10px;">
                    <input type="date" id="set_start"><input type="date" id="set_end">
                    <button style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px;" onclick="savePeriod()">儲存賽期</button>
                    <div id="adminPlayerList" style="max-height: 150px; overflow-y: auto;"></div>
                </div>
            </div>

            <div id="runner-animation-box" class="glass">
                <div class="bg-text-stream">抓狂中！快跑！抓狂中！快跑！抓狂中！快跑！</div>
                <span class="animation-title">全力抓狂跑步中！！！</span>
                <img src="https://media.tenor.com/qL5_Z7Yh7oIAAAAi/pato-papao.gif" alt="Crazy Runner" class="funny-runner">
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    /* 動畫與邏輯部分保持不變，僅確保 window.onload 正常執行 */
    function runIntroAnimation() {
        const title = document.getElementById('intro-title');
        const sub = document.getElementById('intro-sub');
        const bar = document.getElementById('intro-bar');
        setTimeout(() => { title.classList.add('animate-title'); }, 200);
        setTimeout(() => { sub.style.opacity = "1"; }, 1000);
        setTimeout(() => { bar.style.width = "100%"; }, 100);
        window.introTimer = setTimeout(closeIntro, 5500);
    }
    function closeIntro() {
        clearTimeout(window.introTimer);
        const overlay = document.getElementById('intro-overlay');
        overlay.style.opacity = "0";
        overlay.style.transform = "scale(1.2)";
        setTimeout(() => { overlay.remove(); makeItRain(); }, 1000);
    }
    const CONFIG = { token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json' };
    let players = [], prevRankMap = {}, period = { start: "", end: "2026-04-13" }, fileSha = "", isFinalDay = false;

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, { headers: { "Authorization": `token ${CONFIG.token}` } });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            const currentSorted = [...players].sort((a, b) => b.progress - a.progress);
            prevRankMap = {}; currentSorted.forEach((p, index) => { prevRankMap[p.name] = index + 1; });
            players = content.players || []; period = content.period || { start: "", end: "2026-04-13" };
            checkFinalPhase(); renderList(); updateCountdown();
            document.getElementById('syncTime').innerText = `最後同步：${new Date().toLocaleTimeString()}`;
            document.getElementById('periodDisplay').innerText = `期間：${period.start || '未設定'} ~ ${period.end}`;
            if(localStorage.getItem('admin_auth') === 'true') showAdminUI();
        } catch (e) { console.error("同步失敗", e); }
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }

    function checkFinalPhase() {
        const end = new Date(period.end + "T23:59:59").getTime(), now = new Date().getTime();
        isFinalDay = (end - now < 86400000 && end - now > 0);
        document.getElementById('finalArea').style.opacity = isFinalDay ? "1" : "0.5";
        document.getElementById('u_f').disabled = !isFinalDay;
        document.getElementById('u_img').disabled = !isFinalDay;
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(parseFloat(p.progress) || 0, 0), 100);
            const targetW = p.tbmi * ((p.h/100)*(p.h/100));
            const color = barW >= 80 ? '#27ae60' : (barW >= 40 ? '#f39c12' : '#e74c3c');
            return `<div class="rank-card">
                <div style="font-size: 24px; font-weight: 900; color: var(--gold); width: 45px; text-align:center;">${i+1}</div>
                <div class="p-info">
                    <div style="font-size: 18px; font-weight: bold;">${p.name}</div>
                    <div style="font-size: 11px; opacity: 0.6;">最後更新: ${p.lastUpdate || '-'}</div>
                </div>
                <div class="p-track">
                    <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                    <div class="runner-box" style="left: ${barW}%;"><span class="runner-emoji">🏃</span></div>
                </div>
            </div>`;
        }).join('');
    }

    function toggleMenu(id) {
        const target = document.getElementById(id), isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function makeItRain() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
    function updateCountdown() { /* 倒數邏輯... */ }

    window.onload = () => { runIntroAnimation(); syncFromGitHub(); setInterval(syncFromGitHub, 30000); };
</script>
</body>
</html>

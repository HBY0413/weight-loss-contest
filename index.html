<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD 體態健康挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        html { background-color: #0d1117; overscroll-behavior-y: none; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            min-height: 100vh; display: flex; align-items: flex-start; 
            justify-content: center; color: var(--text); overflow-y: auto; padding: 20px 0;
        }
        
        /* Intro Overlay */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; transition: all 1s ease-in-out;
        }
        @keyframes title-reveal {
            from { opacity: 0; transform: scale(0.8); letter-spacing: 30px; filter: blur(10px); }
            to { opacity: 1; transform: scale(1); letter-spacing: 15px; filter: blur(0); }
        }
        .animate-title { animation: title-reveal 2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        
        .intro-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer;
            backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s; /* 修正延遲 */
        }
        .intro-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); }

        /* Layout */
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; min-height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }
        .glass { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0; }
        
        .sync-style-text { font-size: 10px; color: rgba(255, 255, 255, 0.5); white-space: nowrap; }
        #musicControl { cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; gap: 8px; }
        
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .menu-trigger { width: 100%; padding: 15px 20px; background: transparent; border: none; text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 85vh; overflow-y: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        /* Rank Display */
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 10px; }
        .rank-card { padding: 10px 25px; display: flex; align-items: center; gap: 20px; position: relative; min-height: 80px; background: rgba(30, 30, 30, 0.3) !important; backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .p-info { flex: 0 0 220px; }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; transform: scaleX(-1); }
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-8px) scaleX(-1); } }

        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        .target-bmi-label { position: absolute; right: 0; top: -20px; font-size: 11px; color: var(--gold); opacity: 0.9; font-weight: bold; }
        .final-badge { background: var(--gold); color: #000; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; }

        .final-stat-box { display: flex; gap: 5px; margin-top: 5px; }
        .stat-chip { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.8); }
        .val-pos { color: #2ecc71; } 
        .val-neg { color: #e74c3c; }

        /* --- RWD Patch --- */
        @media (max-width: 992px) {
            .main-layout { flex-direction: column; align-items: center; }
            .control-panel { flex: none; width: 100%; position: relative; top: 0; }
            .rank-display { width: 100%; }
        }

        @media (max-width: 600px) {
            #intro-title { font-size: 45px !important; letter-spacing: 8px !important; }
            .rank-card { flex-direction: column; align-items: flex-start; padding: 20px; gap: 10px; }
            .rank-card > div:first-child { width: 100%; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
            .p-info { flex: none; width: 100%; }
            .p-track { width: 95%; margin-left: 5px; margin-top: 40px; }
            #totalPrize { font-size: 26px; }
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div style="position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 10001;">
        <button class="intro-btn" onclick="toggleMusic()" id="introMusicBtn">🔊 Music: OFF</button>
        <button class="intro-btn" style="border-color: var(--gold); color: var(--gold);" onclick="closeIntro()">SKIP ❯❯</button>
    </div>
    <div style="text-align: center; padding: 20px;">
        <h1 id="intro-title" style="font-size: 80px; font-weight: 900; color: var(--gold); margin: 0; opacity: 0; filter: drop-shadow(0 0 20px rgba(241,196,15,0.5));">ASGARD</h1>
        <p id="intro-sub" style="color: rgba(255,255,255,0.4); letter-spacing: 10px; margin-top: 10px; opacity: 0; transition: 1s;">BODY TRANSFORMATION 2026</p>
    </div>
    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1);">
        <div id="intro-bar" style="width: 0%; height: 100%; background: var(--gold); transition: width 5.8s linear;"></div>
    </div>
</div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px;" onclick="syncFromGitHub()">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div id="musicControl" onclick="event.stopPropagation(); toggleMusic()">
                    <span id="musicToggle">🔇</span> 
                    <span id="musicStatusText" class="sync-style-text">點擊開啟背景音樂</span>
                </div>
                <span style="font-size: 12px; font-weight: bold; color: #fff;">資料自動同步 🔄</span>
            </div>
            <div id="syncTime" class="sync-style-text" style="text-align: right;">最後同步：等待中...</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer; display: inline-block; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 挑戰賽獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="text-align:center; padding: 8px; font-size: 11px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);">期間：載入中...</div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass"> 
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高(cm)">
                <input type="number" id="r_w" placeholder="初始體重(kg)">
                <input type="number" id="r_waist" placeholder="初始腰圍(吋)">
                <input type="number" id="r_smm" placeholder="初始肌肉量 SMM(kg)">
                <input type="number" id="r_fat_kg" placeholder="初始脂肪重(kg)">
                <select id="r_target_bmi">
                    <option value="24">目標 BMI 24 | 健康維護</option>
                    <option value="22">目標 BMI 22 | 精實健美</option>
                    <option value="20">目標 BMI 20 | 極致挑戰</option>
                </select>
                <input type="password" id="r_acc" placeholder="設定體重更新密碼">
                <button id="regBtn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doRegister()">確認報名</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新紀錄 / 結算 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <div id="finalNotice" class="formula-box" style="display:none; color: var(--gold); font-size: 12px; margin-bottom: 10px;">🏁 賽末結算：肌肉/脂肪/照片為必填。</div>
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="輸入密碼">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="u_w" placeholder="體重">
                    <input type="number" id="u_waist" placeholder="腰圍">
                </div>
                <div id="finalArea" style="opacity:0.5">
                    <input type="number" id="u_smm" placeholder="最終肌肉量(kg)" disabled>
                    <input type="number" id="u_fat_kg" placeholder="最終脂肪重(kg)" disabled>
                    <input type="text" id="u_img" placeholder="InBody 照片連結" disabled>
                </div>
                <button id="updBtn" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doUpdate()">同步數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者 <span>+</span></button>
            <div id="adminForm" class="menu-content">
                <div id="adminLoginSection">
                    <input type="password" id="adm_pw" placeholder="管理者密鑰">
                    <button style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doAdminLogin()">進入管理模式</button>
                </div>
                <div id="adminDataArea" style="display:none;">
                    <input type="date" id="set_start">
                    <input type="date" id="set_end">
                    <button style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer; margin-bottom:10px;" onclick="savePeriod()">儲存賽期</button>
                    <div id="adminPlayerList" style="max-height: 150px; overflow-y: auto;"></div>
                    <button style="width:100%; padding:10px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer; margin-top:10px;" onclick="doAdminLogout()">登出</button>
                </div>
            </div>
        </div>
    </div>

    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 6秒自動關閉與動畫邏輯
    function runIntroAnimation() {
        const title = document.getElementById('intro-title');
        const sub = document.getElementById('intro-sub');
        const bar = document.getElementById('intro-bar');
        setTimeout(() => { title.classList.add('animate-title'); }, 200);
        setTimeout(() => { sub.style.opacity = "1"; }, 1000);
        setTimeout(() => { bar.style.width = "100%"; }, 100);
        window.introTimer = setTimeout(closeIntro, 6000); // 準時 6 秒
    }

    function closeIntro() {
        clearTimeout(window.introTimer);
        const overlay = document.getElementById('intro-overlay');
        overlay.style.opacity = "0";
        overlay.style.transform = "scale(1.1) blur(20px)";
        setTimeout(() => { overlay.remove(); makeItRain(); }, 1000);
    }

    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let prevRankMap = {};
    let period = { start: "", end: "2026-04-13" };
    let fileSha = "";
    let isFinalDay = false;

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            
            // 紀錄舊排名用於趨勢分析
            const currentSorted = [...players].sort((a, b) => b.progress - a.progress);
            prevRankMap = {};
            currentSorted.forEach((p, index) => { prevRankMap[p.name] = index + 1; });

            players = content.players || [];
            period = content.period || { start: "", end: "2026-04-13" };
            
            checkFinalPhase();
            renderList();
            updateCountdown();
            document.getElementById('syncTime').innerText = `最後同步：${new Date().toLocaleTimeString()}`;
            document.getElementById('periodDisplay').innerText = `期間：${period.start || '未設定'} ~ ${period.end}`;
            if(localStorage.getItem('admin_auth') === 'true') showAdminUI();
        } catch (e) { console.error("同步失敗", e); }
    }

    function checkFinalPhase() {
        const end = new Date(period.end + "T23:59:59").getTime();
        const now = new Date().getTime();
        isFinalDay = (end - now < 86400000 && end - now > 0);
        const area = document.getElementById('finalArea');
        const inputs = area.querySelectorAll('input');
        if(isFinalDay) {
            area.style.opacity = "1";
            inputs.forEach(i => i.disabled = false);
            document.getElementById('finalNotice').style.display = "block";
        }
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(parseFloat(p.progress) || 0, 0), 100);
            const targetW = p.tbmi * ((p.h/100)*(p.h/100));
            const isLosing = p.sw > targetW; 
            const speed = 0.6 - (barW / 100 * 0.45);
            const color = barW >= 80 ? '#27ae60' : (barW >= 40 ? '#f39c12' : '#e74c3c');
            const lastRank = prevRankMap[p.name];
            let trend = lastRank ? (i+1 < lastRank ? '<span class="val-pos">▲</span>' : (i+1 > lastRank ? '<span class="val-neg">▼</span>' : '-')) : '-';

            let finalStats = p.isFinal ? `
                <div class="final-stat-box">
                    <span class="stat-chip">肌肉 <span class="${p.csmm-p.ssmm>=0?'val-pos':'val-neg'}">${p.csmm-p.ssmm>=0?'+':''}${(p.csmm-p.ssmm).toFixed(1)}kg</span></span>
                    <span class="stat-chip">脂肪 <span class="${p.cfat-p.sfat<=0?'val-pos':'val-neg'}">${p.cfat-p.sfat>0?'+':''}${(p.cfat-p.sfat).toFixed(1)}kg</span></span>
                </div>` : '';

            return `
                <div class="rank-card">
                    <div style="font-size: 22px; font-weight: 900; color: var(--gold); text-align:center;">
                        ${i+1}<br><span style="font-size:12px">${trend}</span>
                    </div>
                    <div class="p-info">
                        <div style="font-size: 18px; font-weight: bold;">
                            ${i < 3 ? ['👑','🥈','🥉'][i] : ''} ${p.name} ${p.isFinal?'<span class="final-badge">結算</span>':''}
                            <span class="bmi-tag ${isLosing?'tag-lose':'tag-gain'}">${isLosing?'減重':'增重'}</span>
                        </div>
                        ${finalStats}
                        <div style="font-size: 10px; opacity: 0.5; margin-top: 5px;">最後更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="target-bmi-label">目標 BMI ${p.tbmi} 🏁</div>
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 15px ${color}66;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <div style="font-size: 10px; font-weight: bold;">${barW}%</div>
                            <span class="runner-emoji" style="animation-duration: ${speed}s">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // --- 其他功能函數 ---
    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT", headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content, sha: fileSha })
        });
        syncFromGitHub();
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic'), introBtn = document.getElementById('introMusicBtn');
        if (m.paused) {
            m.play(); document.getElementById('musicToggle').innerText = "🔊";
            if(introBtn) introBtn.innerText = "🔊 Music: ON";
        } else {
            m.pause(); document.getElementById('musicToggle').innerText = "🔇";
            if(introBtn) introBtn.innerText = "🔇 Music: OFF";
        }
    }

    function makeItRain() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f1c40f', '#e67e22', '#ffffff'] });
    }

    function updateCountdown() {
        const target = new Date(period.end + "T23:59:59").getTime();
        const distance = target - new Date().getTime();
        if (distance < 0) { document.getElementById('ddayDisplay').innerText = "挑戰已結束"; return; }
        const d = Math.floor(distance / 86400000), h = Math.floor((distance % 86400000) / 3600000), m = Math.floor((distance % 3600000) / 60000), s = Math.floor((distance % 60000) / 1000);
        document.getElementById('ddayDisplay').innerText = `${String(d).padStart(2,'0')}D ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    window.onload = () => {
        runIntroAnimation();
        syncFromGitHub();
        setInterval(syncFromGitHub, 30000);
        setInterval(updateCountdown, 1000);
    };

    // 餘下管理員與報名邏輯保持不變...
    function doAdminLogin() { if(document.getElementById('adm_pw').value === 'gogofit666') { localStorage.setItem('admin_auth', 'true'); showAdminUI(); } }
    function showAdminUI() { document.getElementById('adminLoginSection').style.display = 'none'; document.getElementById('adminDataArea').style.display = 'block'; renderAdminList(); }
    function doAdminLogout() { localStorage.removeItem('admin_auth'); location.reload(); }
    function renderAdminList() { document.getElementById('adminPlayerList').innerHTML = players.map((p, i) => `<div style="padding:5px; border-bottom:1px solid #333">${p.name} <button onclick="deletePlayer(${i})">X</button></div>`).join(''); }
</script>
</body>
</html>

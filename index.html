<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden;
        }
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; height: 85vh; align-items: flex-start; }
        
        /* 左側控制面板修正：增加溢出處理 */
        .control-panel { 
            flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; height: 100%; 
            overflow-y: auto; padding-right: 5px;
        }
        /* 隱藏左側控制面板的捲軸但保留滾動功能 */
        .control-panel::-webkit-scrollbar { width: 0px; background: transparent; }

        .glass { 
            background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0;
        }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 1200px; padding: 15px 20px; } /* 提高 max-height 以確保不被切掉 */
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        .rank-display { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
        .rank-card { 
            padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; 
            min-height: 100px; background: rgba(40, 40, 40, 0.5) !important;
        }
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 40px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        
        .runner-box { position: absolute; top: -48px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 28px; animation: bounce linear infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        
        .bmi-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; border: 1px solid; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: #3498db; }
        
        .rank-display::-webkit-scrollbar, #adminPlayerList::-webkit-scrollbar { width: 6px; }
        .rank-display::-webkit-scrollbar-thumb, #adminPlayerList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">點擊開啟背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer; display: inline-block; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 挑戰賽獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24</option>
                        <option value="22">目標 BMI 22</option>
                        <option value="20">目標 BMI 20</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="設定更新密碼">
                    <button style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="輸入密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <div id="adminLoginSection">
                        <input type="password" id="adm_pw" placeholder="管理者密鑰">
                        <button style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="doAdminLogin()">進入管理模式</button>
                    </div>
                    <div id="adminDataArea" style="display:none; margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                        <label style="font-size:11px; opacity:0.7; margin-bottom:5px; display:block;">賽期設定：</label>
                        <input type="date" id="set_start">
                        <input type="date" id="set_end">
                        <button style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer; margin-bottom:15px;" onclick="savePeriod()">儲存賽期設定</button>
                        
                        <label style="font-size:11px; opacity:0.7; margin-bottom:5px; display:block; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">目前參賽名單：</label>
                        <div id="adminPlayerList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
                        
                        <button style="width:100%; padding:10px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer;" onclick="doAdminLogout()">登出管理權限</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "2026-04-13" };
    let fileSha = "";

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "2026-04-13" };
            renderList();
            updateCountdown();
            if(localStorage.getItem('admin_auth') === 'true') renderAdminList();
        } catch (e) { console.error("同步失敗"); }
    }

    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT", headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content, sha: fileSha })
        });
        syncFromGitHub();
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const isLosing = (p.tbmi || 24) < (p.sw / ((p.h/100)*(p.h/100))); 
            const speed = 0.6 - (barW / 100 * 0.45);
            const color = barW >= 80 ? '#27ae60' : (barW >= 40 ? '#f39c12' : '#e74c3c');

            return `
                <div class="glass rank-card">
                    <div style="font-size: 24px; font-weight: 900; color: var(--gold); width: 30px;">${i + 1}</div>
                    <div class="p-info">
                        <div style="font-size: 18px; font-weight: bold;">
                            ${i === 0 ? '👑 ' : ''}${p.name}
                            <span class="bmi-tag ${isLosing ? 'tag-lose' : 'tag-gain'}">${isLosing ? '減重' : '增重'}</span>
                        </div>
                        <div style="font-size: 11px; opacity: 0.6; margin-top: 5px;">更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 15px ${color}66;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <div style="font-size: 10px; font-weight: bold; margin-bottom: 2px;">${barW}%</div>
                            <span class="runner-emoji" style="animation-duration: ${speed}s">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderAdminList() {
        document.getElementById('adminPlayerList').innerHTML = players.map((p, i) => `
            <div style="background:rgba(0,0,0,0.2); border-radius:8px; padding:8px; margin-bottom:8px; font-size:12px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                    <span style="font-weight:bold; color:var(--gold);">${p.name}</span>
                    <button onclick="deletePlayer(${i})" style="color:#ff4d4d; background:none; border:none; cursor:pointer; font-weight:bold;">[移除]</button>
                </div>
                <div style="opacity:0.6; font-size:10px;">
                    進度: ${p.progress}% | 體重: ${p.cw}kg<br>
                    最後更新: ${p.lastUpdate || '未更新'}
                </div>
            </div>
        `).join('');
    }

    function doAdminLogin() {
        if(document.getElementById('adm_pw').value === 'gogofit666') {
            localStorage.setItem('admin_auth', 'true');
            showAdminUI();
        } else { alert("密碼錯誤"); }
    }

    function showAdminUI() {
        document.getElementById('adminLoginSection').style.display = 'none';
        document.getElementById('adminDataArea').style.display = 'block';
        if(period.start) document.getElementById('set_start').value = period.start;
        if(period.end) document.getElementById('set_end').value = period.end;
        renderAdminList();
    }

    function doAdminLogout() {
        localStorage.removeItem('admin_auth');
        location.reload();
    }

    function deletePlayer(i) { if(confirm(`確定要將選手 ${players[i].name} 移除嗎？`)) { players.splice(i,1); pushToGitHub(); } }
    
    function savePeriod() { 
        period.start = document.getElementById('set_start').value; 
        period.end = document.getElementById('set_end').value; 
        if(!period.start || !period.end) return alert("請填寫日期");
        pushToGitHub(); alert("賽期已更新"); 
    }

    function makeItRain() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f1c40f', '#e67e22', '#ffffff'] });
        const bag = document.getElementById('moneyBag');
        bag.style.transform = 'scale(1.3)';
        setTimeout(() => bag.style.transform = 'scale(1)', 100);
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('active'));
        if (!isOpen) target.classList.add('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }

    function updateCountdown() {
        if(!period.end) return;
        const target = new Date(period.end + "T23:59:59").getTime();
        const now = new Date().getTime();
        const distance = target - now;
        if (distance < 0) {
            document.getElementById('ddayDisplay').innerText = "比賽已結束！";
            return;
        }
        const days = Math.floor(distance / 86400000);
        const hours = Math.floor((distance % 86400000) / 3600000);
        const minutes = Math.floor((distance % 3600000) / 60000);
        const seconds = Math.floor((distance % 60000) / 1000);
        document.getElementById('ddayDisplay').innerText = `${String(days).padStart(2,'0')}D ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        const tbmi = parseFloat(document.getElementById('r_target_bmi').value);
        const acc = document.getElementById('r_acc').value;
        if(!name || !h || !sw || !acc) return alert("請填寫完整報名資訊");
        players.push({ name, h, sw, cw: sw, tbmi, acc, progress: 0, lastUpdate: new Date().toLocaleString() });
        pushToGitHub(); toggleMenu('regForm');
    }

    function doUpdate() {
        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("驗證失敗");
        p.cw = w; p.lastUpdate = new Date().toLocaleString();
        const targetW = p.tbmi * ((p.h/100)*(p.h/100));
        const initialGap = Math.abs(p.sw - targetW);
        const currentGap = Math.abs(w - targetW);
        p.progress = initialGap === 0 ? 100 : Math.max(0, ((1 - (currentGap / initialGap)) * 100)).toFixed(1);
        pushToGitHub(); toggleMenu('updForm');
    }

    window.onload = () => {
        syncFromGitHub();
        setInterval(updateCountdown, 1000);
        if(localStorage.getItem('admin_auth') === 'true') showAdminUI();
    };
</script>
</body>
</html>

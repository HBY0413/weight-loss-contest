<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 獎金爭奪戰</title>
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; --accent: #e67e22; --bg: #fdfaf5; --text: #333; --success: #27ae60; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        
        /* 寶藏獎金區 */
        .treasure-header { 
            background: linear-gradient(135deg, #f39c12, #f1c40f); 
            color: white; padding: 30px 20px; border-radius: 20px; text-align: center; margin-bottom: 25px;
        }
        .treasure-icon { font-size: 50px; display: block; }
        .prize-amount { font-size: 42px; font-weight: 900; }

        /* 個人更新專區 */
        .personal-zone { background: #fff9db; border: 2px solid #fab005; padding: 15px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        
        /* 排行榜 */
        .rank-card { background: #fff; border: 1px solid #f1f3f5; padding: 18px; border-radius: 16px; margin-bottom: 12px; }
        .progress-bg { background: #edf2f7; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar { background: linear-gradient(90deg, #2ecc71, #27ae60); height: 100%; transition: width 1s; }

        /* 按鈕與表單 */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: transparent; color: #a0aec0; font-size: 12px; text-decoration: underline; border: none; }
        
        .hidden { display: none; }
        input { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="treasure-header">
        <span class="treasure-icon">💰</span>
        <div style="font-size: 14px; font-weight: bold;">目前總獎金池</div>
        <div class="prize-amount" id="totalPrize">NT$ 0</div>
        <div id="participantCount">共 0 人參賽</div>
    </div>

    <div id="personalZone" class="personal-zone hidden">
        <h3 style="margin:0;">👋 哈囉，<span id="userNameDisplay"></span></h3>
        <p style="font-size:12px; color:#666;">這是你的專屬更新通道</p>
        <input type="number" id="update_cw" placeholder="輸入本週體重 (kg)">
        <button class="btn btn-main" onclick="quickUpdate()">更新我的數據</button>
    </div>

    <div id="rankContainer"></div>

    <div id="publicButtons">
        <button id="regBtn" class="btn btn-main" onclick="togglePanel('registerForm')">我要報名參賽</button>
        <button class="btn-sub" style="display:block; margin: 10px auto;" onclick="togglePanel('adminLogin')">管理登入</button>
    </div>

    <div id="registerForm" class="hidden" style="padding:20px; background:#f8fafc; border-radius:15px; margin-top:15px;">
        <h3>🏃 填寫資料建立帳號</h3>
        <input type="text" id="reg_name" placeholder="姓名 (報名後不可修改)">
        <input type="number" id="reg_h" placeholder="身高 (cm)">
        <input type="number" id="reg_sw" placeholder="初始體重 (kg)">
        <input type="number" id="reg_cw" placeholder="目前體重 (kg)">
        <button class="btn btn-main" onclick="register()">完成報名</button>
    </div>

    <div id="adminLogin" class="hidden">... (維持前一版代碼) ...</div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('diet_v4')) || [];
    let myName = localStorage.getItem('diet_my_name'); // 關鍵：識別身分

    function init() {
        if (myName) {
            document.getElementById('regBtn').classList.add('hidden');
            document.getElementById('personalZone').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = myName;
        }
        render();
    }

    function register() {
        const name = document.getElementById('reg_name').value;
        const h = parseFloat(document.getElementById('reg_h').value);
        const sw = parseFloat(document.getElementById('reg_sw').value);
        const cw = parseFloat(document.getElementById('reg_cw').value);

        if (!name || !h || !sw || !cw) return alert("請填全！");
        
        const target = Math.round(((h / 100) ** 2 * 24) * 10) / 10;
        const progress = ((sw - cw) / (sw - target) * 100).toFixed(1);

        players.push({ name, h, sw, cw, target, progress });
        localStorage.setItem('diet_v4', JSON.stringify(players));
        localStorage.setItem('diet_my_name', name); // 綁定這台裝置
        
        location.reload(); // 重新整理以載入個人區域
    }

    function quickUpdate() {
        const newWeight = parseFloat(document.getElementById('update_cw').value);
        if (!newWeight) return alert("請輸入體重");

        const idx = players.findIndex(p => p.name === myName);
        if (idx > -1) {
            const p = players[idx];
            p.cw = newWeight;
            p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
            
            localStorage.setItem('diet_v4', JSON.stringify(players));
            alert("更新成功！加油！");
            render();
        }
    }

    function render() {
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        document.getElementById('participantCount').innerText = `共 ${players.length} 人參賽`;

        container.innerHTML = sorted.length ? '' : '<p style="text-align:center; color:#ccc;">等待第一位勇士...</p>';
        sorted.forEach((p, i) => {
            container.innerHTML += `
                <div class="rank-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>${i === 0 ? '👑' : i+1}. ${p.name}</span>
                        <span style="color:#27ae60;">${p.progress}%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-bar" style="width:${Math.max(p.progress,0)}%"></div></div>
                </div>
            `;
        });
    }

    init();
</script>
</body>
</html>

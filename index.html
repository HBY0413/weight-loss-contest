<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            /* 背景使用深色漸層確保文字清晰 */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1596708688177-d6e5074d32f3?q=80&w=2000'); 
            background-size: cover; 
            background-attachment: fixed; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* --- 音樂控制區 (左上角) --- */
        .music-controller {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; z-index: 100;
        }
        .speaker-icon {
            font-size: 20px; background: rgba(255, 255, 255, 0.9);
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 0 15px var(--gold);
        }
        .music-text { font-size: 11px; color: #fff; font-weight: bold; text-shadow: 0 0 5px #000; }

        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* --- 錢袋與金幣 --- */
        .treasure-header { background: linear-gradient(135deg, #1a253a, #2c3e50); color: var(--gold); padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        #moneyBag { display: inline-block; cursor: pointer; transition: transform 0.2s; }
        #moneyBag:active { transform: scale(1.2); }
        @keyframes coinFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(150px) rotate(360deg); opacity: 0; } }
        .coin-particle { position: absolute; font-size: 20px; pointer-events: none; animation: coinFall 1s forwards ease-in; }

        .prize-amount { font-size: 42px; font-weight: 900; color: var(--gold); text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .timer-box { background: #111; color: var(--gold); padding: 12px; font-size: 20px; text-align: center; font-weight: bold; font-family: monospace; }
        
        /* --- 排行榜 & 小人動畫核心 --- */
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .rank-card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; position: relative; min-height: 110px; }
        
        .p-track { flex: 1; position: relative; height: 12px; background: #ddd; border-radius: 6px; margin-top: 45px; }
        /* 增加 transition 讓進度條平滑 */
        .p-fill { height: 100%; border-radius: 6px; position: absolute; left: 0; top: 0; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .runner-box { 
            position: absolute; top: -52px; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; 
            transition: left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 跟隨進度條移動 */
        }

        /* 讓小人動起來的關鍵動畫 */
        @keyframes runnerRun {
            0% { transform: translateX(-50%) scaleX(-1) translateY(0); }
            50% { transform: translateX(-50%) scaleX(-1) translateY(-5px); }
            100% { transform: translateX(-50%) scaleX(-1) translateY(0); }
        }
        .runner-emoji { 
            font-size: 32px; display: inline-block;
            animation: runnerRun 0.4s infinite linear; 
        }
        .runner-percent { font-size: 12px; font-weight: 900; background: #fff; padding: 2px 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 2px; }

        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; color: var(--primary); }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: #fff; }
        .menu-content.active { max-height: 1000px; padding: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; }
        .type-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; background: #eee; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="music-controller" onclick="toggleMusic()">
    <div class="speaker-icon" id="musicToggle">🔇</div>
    <div class="music-text">點擊開啟音樂</div>
</div>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" onclick="dropCoins()"><span style="font-size: 50px;">💰</span></div>
                <div style="font-size: 14px; font-weight: bold; margin-top: 5px;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #000; color: #fff; font-size: 11px; text-align: center; padding: 5px;">同步中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
        </div>

        <div class="glass">
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" placeholder="姓名">
                <button class="btn-submit">確認報名</button>
            </div>
            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <input type="number" placeholder="今日體重(kg)">
                <button class="btn-submit" style="background:var(--success);">同步數據</button>
            </div>
        </div>
    </div>
    
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 補齊缺失的同步邏輯與動畫觸發
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; }
        else { m.pause(); btn.innerText = "🔇"; }
    }

    function dropCoins() {
        const bag = document.getElementById('moneyBag');
        const container = bag.parentElement;
        for (let i = 0; i < 6; i++) {
            const coin = document.createElement('div');
            coin.className = 'coin-particle';
            coin.innerText = '🪙';
            coin.style.left = `calc(50% + ${Math.random() * 60 - 30}px)`;
            coin.style.top = '40px';
            container.appendChild(coin);
            setTimeout(() => coin.remove(), 1000);
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            render(content.players, content.period);
        } catch (e) { console.log("Sync Error"); }
    }

    function render(players = [], period = {}) {
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        document.getElementById('periodDisplay').innerText = `期間：${period.start} ~ ${period.end}`;
        
        const container = document.getElementById('rankContainer');
        container.innerHTML = '';
        
        [...players].sort((a,b) => b.progress - a.progress).forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 50 ? '#f39c12' : '#e74c3c');
            
            container.innerHTML += `
                <div class="rank-card">
                    <div style="flex:0 0 50px; font-size:28px; font-weight:900; color:#1a253a; text-align:center;">${i+1}</div>
                    <div style="flex:0 0 140px;">
                        <div style="font-weight:900; font-size:18px;">${p.name}</div>
                        <span class="type-tag">${p.sw > 70 ? '減重' : '增重'}</span>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="color:${color}">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isActive = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('active'));
        if(!isActive) target.classList.add('active');
    }

    window.onload = () => { fetchData(); setInterval(fetchData, 60000); };
</script>
</body>
</html>

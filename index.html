<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士挑戰賽</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        /* 選項切換 */
        .tab-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #edf2f7; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 主資訊卡片 */
        .info-card { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .formula { font-size: 0.9em; color: #666; font-style: italic; }
        
        /* 排行榜樣式 */
        .player-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .player-info { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.85em; color: #555; margin-top: 5px; }
        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; transition: width 0.5s; }
        .highlight { color: var(--accent); font-weight: bold; font-size: 1.1em; }

        /* 表單樣式 */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none; }
        .admin-table { width: 100%; font-size: 0.8em; border-collapse: collapse; margin-top: 15px; }
        .admin-table th, .admin-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🏆 減肥挑戰賽系統</h2>

    <div class="info-card">
        <strong>📌 計算邏輯說明：</strong><br>
        <span class="formula">
            目標體重 = (身高m)² × 24 (目標BMI)<br>
            進度% = (初始體重 - 目前體重) / (初始體重 - 目標體重)
        </span>
    </div>

    <div class="tab-group">
        <button class="tab-btn active" onclick="showTab('main')">排行榜</button>
        <button class="tab-btn" onclick="showTab('player')">我是參賽者</button>
        <button class="tab-btn" onclick="showTab('admin')">管理登入</button>
    </div>

    <div id="tab-main">
        <div id="rankList">載入中...</div>
    </div>

    <div id="tab-player" class="hidden">
        <div class="form-group">
            <label>您的姓名</label>
            <input type="text" id="p_name" placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label>身高 (cm)</label>
            <input type="number" id="p_h" placeholder="例如: 172">
        </div>
        <div class="form-group">
            <label>初始體重 (kg)</label>
            <input type="number" id="p_sw" placeholder="第一天量測的體重">
        </div>
        <div class="form-group">
            <label>本週目前體重 (kg)</label>
            <input type="number" id="p_cw" placeholder="本週量測的體重">
        </div>
        <button class="btn-submit" onclick="handleData()">提交數據</button>
        <p style="font-size: 0.75em; color: #999; margin-top: 10px;">* 資料將儲存於此瀏覽器，管理者可於後台查看詳細數據。</p>
    </div>

    <div id="tab-admin" class="hidden">
        <div id="admin-login">
            <div class="form-group">
                <label>請輸入管理密碼</label>
                <input type="password" id="admin_pw" placeholder="密碼">
            </div>
            <button class="btn-submit" onclick="checkAdmin()">登入後台</button>
        </div>
        
        <div id="admin-content" class="hidden">
            <h3>詳細數據清單</h3>
            <table class="admin-table">
                <thead>
                    <tr><th>姓名</th><th>身高</th><th>初始</th><th>目前</th><th>操作</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
            <button class="btn-submit" style="background:#95a5a6; margin-top:15px;" onclick="logoutAdmin()">登出後台</button>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('fit_data_2026')) || [];

    function showTab(tabName) {
        ['main', 'player', 'admin'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
        document.getElementById(`tab-${tabName}`).classList.remove('hidden');
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(tabName === 'main' ? '排行' : tabName === 'player' ? '參賽' : '管理'));
        });
        if(tabName === 'main') render();
    }

    function handleData() {
        const name = document.getElementById('p_name').value;
        const h = parseFloat(document.getElementById('p_h').value);
        const sw = parseFloat(document.getElementById('p_sw').value);
        const cw = parseFloat(document.getElementById('p_cw').value);

        if(!name || !h || !sw || !cw) return alert("請填寫完整資訊！");

        const target = Math.round(((h / 100) ** 2 * 24) * 10) / 10;
        const progress = ((sw - cw) / (sw - target) * 100).toFixed(1);

        const idx = players.findIndex(p => p.name === name);
        const data = { name, h, sw, cw, target, progress };

        if(idx > -1) players[idx] = data;
        else players.push(data);

        localStorage.setItem('fit_data_2026', JSON.stringify(players));
        alert("數據已送出！");
        showTab('main');
    }

    function checkAdmin() {
        const pw = document.getElementById('admin_pw').value;
        if(pw === 'gogofit666') {
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            renderAdmin();
        } else {
            alert("密碼錯誤！");
        }
    }

    function logoutAdmin() {
        document.getElementById('admin_pw').value = '';
        document.getElementById('admin-login').classList.remove('hidden');
        document.getElementById('admin-content').classList.add('hidden');
    }

    function render() {
        const list = document.getElementById('rankList');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        list.innerHTML = sorted.length ? '' : '<p style="text-align:center;">暫無參賽數據</p>';
        
        sorted.forEach((p, i) => {
            const diff = (100 - p.progress).toFixed(1);
            list.innerHTML += `
                <div class="player-card">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${i+1}. ${p.name}</strong>
                        <span class="highlight">${p.progress}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${Math.min(Math.max(p.progress,0), 100)}%"></div>
                    </div>
                    <div class="player-info">
                        <span>目標 BMI: <b style="color:#2c3e50">24</b></span>
                        <span>目前進度: <b>${p.progress}%</b></span>
                        <span>距離達標還差: <b style="color:var(--danger)">${diff > 0 ? diff : 0}%</b></span>
                    </div>
                </div>
            `;
        });
    }

    function renderAdmin() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';
        players.forEach((p, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.name}</td><td>${p.h}</td><td>${p.sw}</td><td>${p.cw}</td>
                    <td><button onclick="deleteData(${i})" style="font-size:10px;">刪除</button></td>
                </tr>
            `;
        });
    }

    function deleteData(i) {
        if(confirm("確定刪除？")) {
            players.splice(i, 1);
            localStorage.setItem('fit_data_2026', JSON.stringify(players));
            renderAdmin();
        }
    }

    render();
</script>

</body>
</html>

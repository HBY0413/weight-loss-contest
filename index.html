<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text);
        }
        
        /* 寬度調整為 320px，確保左側不切邊 */
        .main-layout { display: flex; gap: 20px; width: 98%; max-width: 1300px; height: 90vh; align-items: flex-start; padding: 0 10px; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; padding-bottom: 20px; }
        
        .glass, .rank-card { 
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.4), rgba(40, 40, 40, 0.4)) !important; 
            backdrop-filter: blur(15px); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px 15px; text-align: center; }
        .timer-box { background: rgba(0, 0, 0, 0.7); color: #f1c40f; padding: 12px; font-size: 16px; text-align: center; font-weight: bold; }
        
        /* 音樂選單位置維持在最上方 */
        .music-bar { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        .menu-item { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; 
            display: flex; justify-content: space-between; color: #fff;
        }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.3); }
        .menu-content.active { max-height: 1000px; padding: 15px; }

        input, select { 
            width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; box-sizing: border-box; 
        }

        /* 小人跑步動畫 */
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .rank-card { padding: 20px; display: flex; align-items: center; gap: 15px; position: relative; min-height: 110px; }
        .p-info { flex: 0 0 140px; }
        .bmi-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; border: 1px solid; margin-left: 5px; }
        .tag-lose { background: rgba(230, 126, 34, 0.2); color: #e67e22; border-color: rgba(230, 126, 34, 0.5); }
        .tag-gain { background: rgba(52, 152, 219, 0.2); color: #3498db; border-color: rgba(52, 152, 219, 0.5); }

        .p-track { flex: 1; position: relative; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 6px; margin-top: 45px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        
        .runner-box { position: absolute; top: -50px; transition: left 1s ease-in-out; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; transform: scaleX(-1); animation: bounce linear infinite alternate; }
        
        /* 基礎跳動動畫 */
        @keyframes bounce { from { transform: scaleX(-1) translateY(0); } to { transform: scaleX(-1) translateY(-8px); } }
        .runner-percent { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass music-bar" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">點擊開啟背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer; transition: transform 0.1s;" onclick="makeItRain()">💰</div>
                <div style="font-size: 11px; font-weight: bold; opacity: 0.9;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div id="periodDisplay" style="font-size: 11px; text-align: center; padding: 8px; background: rgba(0,0,0,0.2);">載入中...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <input type="password" id="r_acc" placeholder="設定密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="輸入密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <div id="admin_auth">
                        <input type="password" id="admin_key" placeholder="管理者密鑰">
                        <button class="btn-submit" style="background:var(--accent);" onclick="verifyAdmin()">驗證權限</button>
                    </div>
                    <div id="admin_ctrl" style="display:none;">
                        <input type="date" id="start_date">
                        <input type="date" id="end_date">
                        <button class="btn-submit" style="background:var(--warning);" onclick="doAdminSync()">更新日期</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 噴錢特效
    function makeItRain() {
        const bag = document.getElementById('moneyBag');
        bag.style.transform = 'scale(1.2)';
        setTimeout(() => bag.style.transform = 'scale(1)', 100);
        
        confetti({
            particleCount: 100, spread: 70, origin: { y: 0.6 },
            colors: ['#f1c40f', '#e67e22', '#fff']
        });
    }

    // 選單切換：一次只開一個
    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => { 
            el.classList.remove('active'); 
            el.style.maxHeight = "0"; 
            el.style.padding = "0 15px"; // 關閉時縮排
        });
        if (!isOpen) { 
            target.classList.add('active'); 
            target.style.maxHeight = "1000px";
            target.style.padding = "15px";
        }
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }

    function verifyAdmin() {
        if(document.getElementById('admin_key').value === '0000') { // 範例密碼
            document.getElementById('admin_auth').style.display = 'none';
            document.getElementById('admin_ctrl').style.display = 'block';
        }
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const isLosing = p.target_w < p.initial_w;
            const typeLabel = isLosing ? '減重' : '增重';
            const typeClass = isLosing ? 'tag-lose' : 'tag-gain';
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 40 ? '#f39c12' : '#e74c3c');
            
            // 關鍵點：進度越高，動畫時間(s)越短，跑得越快
            // 進度 0% = 0.6s, 進度 100% = 0.15s
            const speed = 0.6 - (barW / 100 * 0.45);

            return `
                <div class="rank-card">
                    <div style="flex: 0 0 40px; text-align: center; font-size: 20px; font-weight: 900; color: var(--gold);">${i + 1}</div>
                    <div class="p-info">
                        <div style="font-weight:900; font-size:18px;">
                            ${i === 0 ? '👑 ' : ''}${p.name}
                            <span class="bmi-tag ${typeClass}">${typeLabel}</span>
                        </div>
                        <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;">
                            ${p.initial_w}kg ➔ ${p.target_w}kg
                        </div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 10px ${color}55;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="border-color:${color}">${p.progress}%</span>
                            <span class="runner-emoji" style="animation-duration: ${speed}s">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }
</script>
</body>
</html>

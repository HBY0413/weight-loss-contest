<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - GitHub 同步版</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --track: #edf2f7; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?q=80&w=2000'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 85vh; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 8px; font-size: 13px; text-align: center; font-weight: bold; }
        .menu-item { border-bottom: 1px solid #eee; }
        .menu-trigger { width: 100%; padding: 18px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #fff; }
        .menu-content.active { max-height: 800px; padding: 20px; border-top: 1px solid #f1f1f1; }
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 10px; }
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; gap: 20px; }
        .p-info { flex: 0 0 140px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-percent { font-size: 24px; color: var(--success); font-weight: 900; }
        .p-track { flex: 1; position: relative; height: 16px; background: var(--track); border-radius: 8px; }
        .p-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); border-radius: 8px; transition: width 1s; }
        .runner { position: absolute; top: -38px; transition: left 1s; transform: translateX(-50%) scaleX(-1); font-size: 32px; animation: run-move 0.6s infinite alternate; }
        .flag { position: absolute; right: 0; top: -20px; font-size: 18px; }
        @keyframes run-move { from { transform: translateX(-50%) scaleX(-1) translateY(0); } to { transform: translateX(-50%) scaleX(-1) translateY(-6px); } }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .sync-status { font-size: 10px; color: #999; text-align: center; padding: 5px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <span style="font-size: 40px;">💰</span>
                <div style="font-size: 12px; opacity: 0.9;">2026 減肥戰士總獎金</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div class="timer-box" id="periodDisplay">讀取賽期中...</div>
            <div class="timer-box" style="background: #e67e22; color: white;" id="ddayDisplay">Connecting...</div>
            <div class="sync-status" id="syncStatus">資料同步中...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('bmiInfo')">📊 BMI 評估基準 <span>▼</span></button>
                <div id="bmiInfo" class="menu-content active">
                    <table style="width:100%; font-size:13px;">
                        <tr style="height:30px;"><td>健康範圍</td><td style="text-align:right; color:var(--success); font-weight:bold;">18.5 ~ 24</td></tr>
                        <tr style="height:30px;"><td>體重過重</td><td style="text-align:right; color:var(--accent); font-weight:bold;">24 ~ 27</td></tr>
                    </table>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="真實姓名">
                    <input type="number" id="r_h" placeholder="身高 (cm)">
                    <input type="number" id="r_w" placeholder="初始體重 (kg)">
                    <input type="password" id="r_acc" placeholder="自訂更新密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重 (限六日) <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="密碼">
                    <input type="number" id="u_w" placeholder="本週體重 (kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminPanel')">🔑 管理者與賽期設定 <span>+</span></button>
                <div id="adminPanel" class="menu-content">
                    <div id="adminLoginArea">
                        <input type="password" id="adm_pw" placeholder="管理密碼">
                        <button class="btn-submit" onclick="doAdminLogin()">登入</button>
                    </div>
                    <div id="adminDataArea" style="display:none;">
                        <input type="date" id="set_start">
                        <input type="date" id="set_end">
                        <button class="btn-submit" style="background:#e67e22;" onclick="savePeriod()">儲存賽期</button>
                        <div id="playerList" style="font-size:12px; margin-top:10px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // --- GitHub 配置區 ---
    const CONFIG = {
        token: '填入你的_GITHUB_TOKEN',
        owner: '填入你的帳號',
        repo: '填入你的專案名',
        path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };
    let fileSha = "";

    async function syncFromGitHub() {
        document.getElementById('syncStatus').innerText = "☁️ 正在從雲端同步...";
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            render();
            document.getElementById('syncStatus').innerText = `✅ 最後同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            document.getElementById('syncStatus').innerText = "❌ 同步失敗，請檢查 Token";
        }
    }

    async function pushToGitHub() {
        document.getElementById('syncStatus').innerText = "📤 正在上傳資料...";
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update Data", content, sha: fileSha })
            });
            const result = await res.json();
            fileSha = result.content.sha;
            document.getElementById('syncStatus').innerText = "✅ 資料已安全存入 GitHub";
            render();
        } catch (e) {
            alert("上傳失敗，請確認網路與權限");
        }
    }

    function toggleMenu(id) {
        document.querySelectorAll('.menu-content').forEach(el => el.classList.toggle('active', el.id === id));
    }

    function render() {
        // 更新獎金
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;
        
        // 更新賽期與 D-Day
        const dDisp = document.getElementById('ddayDisplay');
        const pDisp = document.getElementById('periodDisplay');
        if(period.start && period.end) {
            pDisp.innerText = `期間：${period.start} ~ ${period.end}`;
            const now = new Date(); now.setHours(0,0,0,0);
            const start = new Date(period.start); const end = new Date(period.end);
            if(now < start) dDisp.innerText = `距開賽還有 ${Math.ceil((start-now)/(86400000))} 天`;
            else if(now <= end) dDisp.innerText = `比賽中：剩餘 ${Math.ceil((end-now)/(86400000))} 天`;
            else dDisp.innerText = "賽事已結束";
        }

        // 渲染排行
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.length ? '' : '<div class="glass" style="padding:40px; text-align:center;">等待勇士加入...</div>';
        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="p-info">
                        <div class="p-name">${i === 0 ? '👑 ' : ''}${p.name}</div>
                        <div class="p-percent">${p.progress}%</div>
                    </div>
                    <div class="p-track">
                        <div class="flag">🏁</div>
                        <div class="runner" style="left: ${barW}%">🏃</div>
                        <div class="p-fill" style="width: ${barW}%"></div>
                    </div>
                </div>
            `;
        });
    }

    // 業務邏輯封裝
    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const w = parseFloat(document.getElementById('r_w').value);
        const acc = document.getElementById('r_acc').value;
        if(!name || !h || !w || !acc) return alert("資訊不全");
        const targetW = Math.round(((h/100)**2 * 24) * 10) / 10;
        players.push({ name, h, sw: w, cw: w, tbmi: 24, target: targetW, acc, progress: 0 });
        pushToGitHub();
        toggleMenu('none');
    }

    function doUpdate() {
        const day = new Date().getDay();
        if(day !== 6 && day !== 0) return alert("限六日更新");
        const name = document.getElementById('u_name').value;
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("驗證失敗");
        p.cw = w;
        p.progress = ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
        pushToGitHub();
        toggleMenu('none');
    }

    function savePeriod() {
        period.start = document.getElementById('set_start').value;
        period.end = document.getElementById('set_end').value;
        pushToGitHub();
    }

    function doAdminLogin() {
        if(document.getElementById('adm_pw').value === 'gogofit666') {
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminDataArea').style.display = 'block';
            renderAdmin();
        }
    }
    function renderAdmin() {
        const list = document.getElementById('playerList');
        list.innerHTML = players.map((p, i) => `
            <div style="border-bottom:1px solid #eee; padding:5px 0; display:flex; justify-content:space-between;">
                <span>${p.name}</span><button onclick="delPlayer(${i})" style="color:red; background:none; border:none;">刪</button>
            </div>
        `).join('');
    }
    function delPlayer(i) { if(confirm("刪除？")) { players.splice(i, 1); pushToGitHub(); renderAdmin(); } }

    // 初始化與自動同步
    window.onload = syncFromGitHub;
    setInterval(syncFromGitHub, 60000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 健康戰士 - 雙向達標版</title>
    <style>
        :root { --primary: #1a253a; --success: #27ae60; --danger: #e74c3c; --accent: #e67e22; }
        body { font-family: 'PingFang TC', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 1000px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .glass { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .rank-card { background: white; margin-bottom: 15px; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 20px; transition: 0.3s; border-left: 5px solid transparent; }
        .p-track { flex: 1; height: 12px; background: #eee; border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: 1s; position: absolute; }
        .runner { position: absolute; top: -45px; transform: translateX(-50%); transition: 1s; text-align: center; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; color: white; margin-bottom: 5px; display: inline-block; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; }
        .status-over { border-left-color: var(--danger); } /* 減重中 */
        .status-under { border-left-color: #3498db; }    /* 增重中 */
    </style>
</head>
<body>

<div class="container">
    <div class="glass">
        <h3>🏆 獎金池：<span id="prize">NT$ 0</span></h3>
        <hr>
        <h4>🏃 參賽報名</h4>
        <input type="text" id="r_name" placeholder="姓名">
        <input type="number" id="r_h" placeholder="身高 (cm)">
        <input type="number" id="r_w" placeholder="初始體重 (kg)">
        <button onclick="doRegister()">確認報名</button>
        <hr>
        <h4>⚖️ 更新體重</h4>
        <input type="text" id="u_name" placeholder="姓名">
        <input type="number" id="u_w" placeholder="今日體重 (kg)">
        <button style="background: var(--success);" onclick="doUpdate()">同步數據</button>
    </div>

    <div id="rankList"></div>
</div>

<script>
    let players = [];

    function renderList() {
        document.getElementById('prize').innerText = `NT$ ${players.length * 500}`;
        const list = document.getElementById('rankList');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        list.innerHTML = '';

        sorted.forEach((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const isOver = p.sw > p.target; 
            const statusText = isOver ? "減重組" : "增重組";
            const color = isOver ? "var(--accent)" : "#3498db";

            list.innerHTML += `
                <div class="rank-card ${isOver?'status-over':'status-under'}">
                    <div style="font-size: 24px; font-weight: 900;">${i+1}</div>
                    <div style="width: 120px;">
                        <div class="badge" style="background:${color}">${statusText}</div>
                        <div style="font-weight:bold;">${p.name}</div>
                        <div style="font-size:11px; color:#666;">目標: ${p.target}kg</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                        <div class="runner" style="left: ${barW}%;">
                            <div style="font-size:11px; font-weight:bold; color:${color}">${p.progress}%</div>
                            <div style="font-size:24px;">🏃</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function doRegister() {
        const name = document.getElementById('r_name').value;
        const h = parseFloat(document.getElementById('r_h').value);
        const sw = parseFloat(document.getElementById('r_w').value);
        if(!name || !h || !sw) return alert("請填寫完整");

        const currentBMI = sw / ((h/100)**2);
        let targetW;

        // 智慧判定目標：過重者目標 BMI 24，過輕者目標 BMI 18.5
        if (currentBMI > 24) {
            targetW = Math.round(24 * (h/100)**2 * 10) / 10;
        } else if (currentBMI < 18.5) {
            targetW = Math.round(18.5 * (h/100)**2 * 10) / 10;
        } else {
            // 已在健康區間者，目標設為目前的體重（維持即 100%）
            targetW = sw;
        }

        players.push({ name, h, sw, cw: sw, target: targetW, progress: 0 });
        renderList();
    }

    function doUpdate() {
        const name = document.getElementById('u_name').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const p = players.find(x => x.name === name);
        if(!p) return alert("找不到此人");

        p.cw = w;
        
        const initialGap = Math.abs(p.sw - p.target);
        const currentGap = Math.abs(w - p.target);

        // 如果初始就在目標範圍內，進度為 100%
        if (initialGap === 0) {
            p.progress = 100.0;
        } else {
            // 雙向公式：朝目標前進則進度增加
            let prog = (1 - (currentGap / initialGap)) * 100;
            
            // 防呆：如果離目標愈來愈遠（例如減重變胖），進度變負值
            if (p.sw > p.target && w > p.sw) prog = -((w - p.sw) / initialGap * 100);
            if (p.sw < p.target && w < p.sw) prog = -((p.sw - w) / initialGap * 100);
            
            p.progress = prog.toFixed(1);
        }
        
        renderList();
    }
</script>
</body>
</html>

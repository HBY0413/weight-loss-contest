<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            /* 更新底圖為 jpg.jpeg */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('jpg.jpeg'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* --- 修正後的音樂控制區：改為相對定位以便對齊 --- */
        .music-controller {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: transform 0.2s;
            margin-bottom: 5px; margin-left: 5px; /* 微調對齊 */
        }
        .music-controller:hover { transform: scale(1.02); }
        .speaker-icon {
            font-size: 20px; background: rgba(255, 255, 255, 0.9);
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .music-text {
            font-size: 13px; font-weight: bold; color: #fff;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5); letter-spacing: 1px;
        }

        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        
        .control-panel { 
            flex: 0 0 380px; 
            flex-shrink: 0; 
            display: flex; flex-direction: column; gap: 15px; 
            max-height: 100%; overflow-y: auto; padding-bottom: 20px; 
        }
        .control-panel::-webkit-scrollbar { width: 5px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
        
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
        
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 25px 20px; text-align: center; position: relative; overflow: hidden; }
        @keyframes bagShake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-8deg) scale(1.1); }
            75% { transform: rotate(8deg) scale(1.1); }
        }
        #moneyBag { display: inline-block; cursor: pointer; animation: bagShake 2.5s infinite ease-in-out; margin-bottom: 10px; user-select: none; }
        
        @keyframes coinFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg); opacity: 0; }
        }
        .coin-particle { position: absolute; font-size: 16px; pointer-events: none; z-index: 10; animation: coinFall 1.2s forwards ease-in; }

        .prize-amount { font-size: 38px; font-weight: 900; letter-spacing: -1px; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 15px; }
        .rank-display::-webkit-scrollbar { width: 8px; }
        .rank-display::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.5); position: relative; min-height: 100px; }
        
        .rank-number { flex: 0 0 50px; text-align: center; font-size: 24px; font-weight: 900; color: var(--primary); }
        .p-info { flex: 0 0 145px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        
        .p-track { flex: 1; position: relative; height: 14px; background: rgba(51, 51, 51, 0.15); border-radius: 7px; margin-top: 42px; border: 1px solid rgba(0,0,0,0.05); }
        .p-fill { height: 100%; border-radius: 7px; transition: width 1s ease-in-out; position: absolute; left: 0; top: 0; z-index: 1; }
        
        .runner-box { position: absolute; top: -54px; transition: left 1s ease-in-out; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .runner-emoji { font-size: 30px; transform: scaleX(-1); line-height: 1; animation: bounce 0.4s infinite alternate linear; }
        .runner-percent { font-size: 12px; font-weight: 900; background: rgba(255,255,255,0.9); padding: 1px 6px; border-radius: 10px; margin-bottom: -2px; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        @keyframes bounce { from { transform: scaleX(-1) translateY(0); } to { transform: scaleX(-1) translateY(-6px); } }

        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: #fff; }
        .menu-content.active { max-height: 1000px; padding: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="music-controller" onclick="toggleMusic(event)">
            <div class="speaker-icon" id="musicToggle">🔇</div>
            <div class="music-text">點擊開啟背景音樂</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" onclick="dropCoins()"><span style="font-size: 45px;">💰</span></div>
                <div style="font-size: 13px; opacity: 0.9; font-weight: bold;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #1a253a; color: #fff; font-size: 11px; text-align: center; padding: 5px; opacity: 0.7;">同步中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div id="syncStatus" style="font-size: 10px; color: #999; text-align: center; padding: 5px;">☁️</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24 (標準上限)</option>
                        <option value="22">目標 BMI 22 (精實體態)</option>
                        <option value="20">目標 BMI 20 (模特體態)</option>
                        <option value="18.5">目標 BMI 18.5 (標準下限)</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="密碼">
                    <button type="button" class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button type="button" class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };

    function formatMoney(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

    function dropCoins() {
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        if (music.paused) { music.play().then(() => { music.volume = 0.3; toggleBtn.innerText = "🔊"; }); }
        const bag = document.getElementById('moneyBag');
        const emojis = ['🪙', '✨', '💰', '💵'];
        const container = bag.parentElement;
        for (let i = 0; i < 6; i++) {
            const coin = document.createElement('div');
            coin.className = 'coin-particle';
            coin.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            coin.style.left = `calc(50% + ${Math.random() * 80 - 40}px)`;
            coin.style.top = '40px';
            container.appendChild(coin);
            setTimeout(() => coin.remove(), 1200);
        }
    }

    function toggleMusic(event) {
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        if (music.paused) { music.play(); toggleBtn.innerText = "🔊"; } 
        else { music.pause(); toggleBtn.innerText = "🔇"; }
    }

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            renderList();
            updateCountdown();
            document.getElementById('syncStatus').innerText = `✅ 最後同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('syncStatus').innerText = "❌ 連線失敗"; }
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${formatMoney(players.length * 500)}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.length ? '' : '<div class="glass" style="padding:40px; text-align:center;">等待挑戰者...</div>';
        
        sorted.forEach((p, i) => {
            const currentRank = i + 1;
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 50 ? '#f39c12' : '#e74c3c');
            container.innerHTML += `
                <div class="rank-card">
                    <div class="rank-number">${currentRank}</div>
                    <div class="p-info">
                        <div class="p-name">${currentRank === 1 ? '👑 ' : ''}${p.name}</div>
                        <div style="font-size:10px;color:#999;margin-top:5px;">更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="color:${color}">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => { el.classList.remove('active'); el.style.maxHeight = "0"; });
        if (!isOpen) { target.classList.add('active'); target.style.maxHeight = "1000px"; }
    }

    function updateCountdown() {
        if(!period.start) return;
        const dDisp = document.getElementById('ddayDisplay');
        document.getElementById('periodDisplay').innerText = `期間：${period.start} ~ ${period.end}`;
        const diff = new Date(period.end.replace(/-/g, "/") + " 23:59:59") - new Date();
        if (diff > 0) {
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
            dDisp.innerText = `剩餘時間：${d}D ${h}:${m}:${s}`;
        } else dDisp.innerText = "本期已結束";
    }

    window.onload = () => { syncFromGitHub(); setInterval(updateCountdown, 1000); };
    setInterval(syncFromGitHub, 60000);
</script>
</body>
</html>

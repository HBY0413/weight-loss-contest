<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text);
        }
        
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; padding-bottom: 20px; }
        
        /* 統一 40% 高透明深色系 */
        .glass, .rank-card { 
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.4), rgba(40, 40, 40, 0.4)) !important; 
            backdrop-filter: blur(15px); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 25px 20px; text-align: center; }
        .timer-box { background: rgba(0, 0, 0, 0.7); color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        
        /* 選單樣式 */
        .menu-item { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-trigger { 
            width: 100%; padding: 18px 25px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; 
            display: flex; justify-content: space-between; color: #fff;
        }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.3); }
        .menu-content.active { max-height: 1000px; padding: 20px; }

        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; box-sizing: border-box; 
        }
        input::placeholder { color: rgba(255,255,255,0.5); }
        select option { background: #333; color: #fff; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: 10px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        /* 排行榜與標籤樣式 */
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .rank-card { padding: 20px; display: flex; align-items: center; gap: 15px; position: relative; min-height: 100px; }
        .p-info { flex: 0 0 160px; }
        .bmi-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; font-weight: bold; }
        .tag-lose { background: rgba(230, 126, 34, 0.3); color: #e67e22; border: 1px solid #e67e22; }
        .tag-gain { background: rgba(52, 152, 219, 0.3); color: #3498db; border: 1px solid #3498db; }
        .target-bmi-label { position: absolute; right: 25px; top: 35px; font-size: 11px; color: var(--gold); font-weight: bold; }

        /* 進度條與跑步小人 */
        .p-track { flex: 1; position: relative; height: 12px; background: rgba(255, 255, 255, 0.1); border-radius: 6px; margin-top: 40px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s ease-in-out; position: absolute; }
        .runner-box { position: absolute; top: -50px; transition: left 1s ease-in-out; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 28px; transform: scaleX(-1); animation: bounce 0.4s infinite alternate linear; }
        @keyframes bounce { from { transform: scaleX(-1) translateY(0); } to { transform: scaleX(-1) translateY(-6px); } }
        .runner-percent { font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 10px; cursor: pointer;" onclick="toggleMusic()">
            <span id="musicToggle">🔇</span> <span style="font-size: 13px; font-weight: bold;">點擊開啟背景音樂</span>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer;">💰</div>
                <div style="font-size: 13px; font-weight: bold;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div style="font-size: 38px; font-weight: 900;" id="totalPrize">載入中...</div>
            </div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div id="periodDisplay" style="font-size: 11px; text-align: center; padding: 8px; background: rgba(0,0,0,0.2);">同步中...</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24</option>
                        <option value="22">目標 BMI 22</option>
                        <option value="20">目標 BMI 20</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="設定密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="輸入密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <input type="password" id="admin_key" placeholder="管理者密鑰">
                    <input type="date" id="start_date">
                    <input type="date" id="end_date">
                    <button class="btn-submit" style="background:var(--warning);" onclick="doAdminSync()">更新比賽期間</button>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    // 請記得換回你原本的 Token
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            renderList();
            updateCountdown();
        } catch (e) { console.error("同步失敗", e); }
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 50 ? '#f39c12' : '#e74c3c');
            // 判斷增減重標籤
            const typeClass = p.target_w < p.initial_w ? 'tag-lose' : 'tag-gain';
            const typeLabel = p.target_w < p.initial_w ? '減重' : '增重';
            
            return `
                <div class="rank-card">
                    <div style="flex: 0 0 40px; text-align: center; font-size: 20px; font-weight: 900; color: var(--gold);">${i + 1}</div>
                    <div class="p-info">
                        <div style="font-weight:900; font-size:18px;">
                            ${i === 0 ? '👑 ' : ''}${p.name}
                            <span class="bmi-tag ${typeClass}">${typeLabel}</span>
                        </div>
                        <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;">更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="target-bmi-label">目標 BMI: ${p.target_bmi || '22'}</div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color}; box-shadow: 0 0 10px ${color}55;"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="border-color:${color}">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function updateCountdown() {
        if(!period.end) return;
        const diff = new Date(period.end.replace(/-/g, "/") + " 23:59:59") - new Date();
        document.getElementById('periodDisplay').innerText = `期間：${period.start} ~ ${period.end}`;
        if (diff > 0) {
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
            document.getElementById('ddayDisplay').innerText = `剩餘時間：${d}D ${h}:${m}:${s}`;
        } else {
            document.getElementById('ddayDisplay').innerText = "本期已結束";
        }
    }

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => { el.classList.remove('active'); el.style.maxHeight = "0"; });
        if (!isOpen) { target.classList.add('active'); target.style.maxHeight = "1000px"; }
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        const btn = document.getElementById('musicToggle');
        if (m.paused) { m.play(); btn.innerText = "🔊"; } else { m.pause(); btn.innerText = "🔇"; }
    }

    // 啟動與自動同步
    window.onload = () => { syncFromGitHub(); setInterval(updateCountdown, 1000); };
    setInterval(syncFromGitHub, 60000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 動態衝刺版</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --track: #edf2f7; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?q=80&w=2000'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 85vh; }
        .control-panel { flex: 0 0 380px; display: flex; flex-direction: column; gap: 15px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .prize-amount { font-size: 36px; font-weight: 900; }
        .timer-box { background: #1a253a; color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-family: 'Courier New', Courier, monospace; font-weight: bold; border-top: 1px solid #333; }
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 10px; }
        
        /* 排行榜卡片 */
        .rank-card { background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.5); position: relative; }
        .rank-number { flex: 0 0 40px; text-align: center; font-size: 24px; font-weight: 900; color: var(--primary); }
        .rank-change { font-size: 11px; font-weight: bold; margin-top: -5px; }
        .up { color: var(--success); }
        .down { color: var(--danger); }
        .steady { color: #999; }
        
        .p-info { flex: 0 0 130px; }
        .p-name { font-weight: 900; font-size: 18px; color: var(--primary); }
        .p-percent { font-size: 22px; font-weight: 900; }
        .p-track { flex: 1; position: relative; height: 16px; background: var(--track); border-radius: 8px; margin-top: 10px; }
        .p-fill { height: 100%; border-radius: 8px; transition: width 1s, background-color 0.5s; }
        
        /* 跑步跑步起動畫 */
        .runner { position: absolute; top: -38px; transition: left 1s; transform: translateX(-50%) scaleX(-1); font-size: 32px; animation-name: run-move; animation-iteration-count: infinite; animation-direction: alternate; animation-timing-function: linear; }
        .target-label { position: absolute; right: 0; top: -25px; font-size: 10px; color: var(--accent); font-weight: bold; }
        .update-time { font-size: 10px; color: #999; margin-top: 4px; }
        
        @keyframes run-move { from { transform: translateX(-50%) scaleX(-1) translateY(0); } to { transform: translateX(-50%) scaleX(-1) translateY(-6px); } }
        
        /* 選單與互動 */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .menu-trigger { width: 100%; padding: 15px 25px; background: white; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; background: #fff; }
        .menu-content.active { max-height: 500px; padding: 20px; border-bottom: 1px solid #eee; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .sync-status { font-size: 10px; color: #999; text-align: center; padding: 5px; background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass">
            <div class="treasure-header">
                <span style="font-size: 40px;">💰</span>
                <div style="font-size: 12px; opacity: 0.9;">2026 減肥戰士獎金池</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: #1a253a; color: #fff; font-size: 11px; text-align: center; padding: 5px; opacity: 0.7;">賽期載入中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div class="sync-status" id="syncStatus">☁️ 雲端同步中...</div>
        </div>

        <div class="glass">
            <div class="menu-item"><button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button><div id="regForm" class="menu-content"><input type="text" id="r_name" placeholder="姓名"><input type="number" id="r_h" placeholder="身高(cm)"><input type="number" id="r_w" placeholder="初始體重(kg)"><select id="r_target_bmi"><option value="24">目標 BMI 24 (標準)</option><option value="22">目標 BMI 22 (理想)</option><option value="20">目標 BMI 20 (精實)</option></select><input type="password" id="r_acc" placeholder="密碼"><button class="btn-submit" onclick="doRegister()">確認報名</button></div></div>
            <div class="menu-item"><button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重 <span>+</span></button><div id="updForm" class="menu-content"><input type="text" id="u_name" placeholder="姓名"><input type="password" id="u_acc" placeholder="密碼"><input type="number" id="u_w" placeholder="今日體重(kg)"><button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button></div></div>
            <div class="menu-item"><button class="menu-trigger" onclick="toggleMenu('adminPanel')">🔑 管理者設定 <span>+</span></button><div id="adminPanel" class="menu-content"><input type="password" id="adm_pw" placeholder="管理密碼"><button class="btn-submit" onclick="doAdminLogin()">登入</button><div id="adminDataArea" style="display:none; margin-top:10px;"><input type="date" id="set_start"><input type="date" id="set_end"><button class="btn-submit" onclick="savePeriod()">儲存</button></div></div></div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413',
        repo: 'weight-loss-contest',
        path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };
    let fileSha = "";
    let localRankMap = {};

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players.sort((a,b) => b.progress - a.progress).forEach((p, index) => { localRankMap[p.name] = index + 1; });
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            renderList();
            document.getElementById('syncStatus').innerText = `✅ 最後雲端同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('syncStatus').innerText = "❌ 同步失敗"; }
    }

    async function pushToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content, sha: fileSha })
        });
        syncFromGitHub();
    }

    // 核心優化：計算動態跑步速度
    function calculateRunDuration(progress) {
        const p = parseFloat(progress);
        // 公式：1.0s - (進度百分比 * 0

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026Y ASGARD 體態變革者挑戰賽</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('jpg.jpeg'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
            color: var(--text);
        }
        
        /* 音樂控制區 */
        .music-controller {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: transform 0.2s;
            margin-bottom: 5px; margin-left: 5px;
        }
        .music-controller:hover { transform: scale(1.02); }
        .speaker-icon {
            font-size: 20px; background: rgba(0, 0, 0, 0.4);
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .music-text { font-size: 13px; font-weight: bold; color: #fff; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }

        .main-layout { display: flex; gap: 30px; width: 95%; max-width: 1200px; height: 90vh; align-items: flex-start; }
        
        /* 側邊欄與深色磨砂玻璃面板 */
        .control-panel { flex: 0 0 380px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; max-height: 100%; overflow-y: auto; padding-bottom: 20px; }
        .control-panel::-webkit-scrollbar { width: 5px; }
        .control-panel::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        /* 修改為 40% 高透明灰暗色系漸層 */
        .glass { 
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.4), rgba(15, 15, 15, 0.4)); 
            backdrop-filter: blur(15px); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 25px 20px; text-align: center; position: relative; }
        
        @keyframes bagShake { 0%, 100% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(-8deg) scale(1.1); } 75% { transform: rotate(8deg) scale(1.1); } }
        #moneyBag { display: inline-block; cursor: pointer; animation: bagShake 2.5s infinite ease-in-out; margin-bottom: 10px; }
        
        .prize-amount { font-size: 38px; font-weight: 900; letter-spacing: -1px; }
        .timer-box { background: rgba(0, 0, 0, 0.6); color: #f1c40f; padding: 12px; font-size: 18px; text-align: center; font-weight: bold; }
        
        /* 排行榜深色化 */
        .rank-display { flex: 1; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 15px; }
        .rank-card { 
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.4), rgba(20, 20, 20, 0.4)); 
            padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05); position: relative; min-height: 100px; 
        }
        .rank-number { flex: 0 0 50px; text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); }
        
        .p-track { flex: 1; position: relative; height: 14px; background: rgba(255, 255, 255, 0.1); border-radius: 7px; margin-top: 42px; }
        .p-fill { height: 100%; border-radius: 7px; transition: width 1s ease-in-out; position: absolute; left: 0; top: 0; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        
        .runner-box { position: absolute; top: -54px; transition: left 1s ease-in-out; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 30px; transform: scaleX(-1); animation: bounce 0.4s infinite alternate linear; }
        @keyframes bounce { from { transform: scaleX(-1) translateY(0); } to { transform: scaleX(-1) translateY(-6px); } }
        .runner-percent { font-size: 12px; font-weight: 900; background: rgba(0,0,0,0.6); color: #fff; padding: 1px 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }

        /* 選單深色化 */
        .menu-trigger { width: 100%; padding: 15px 25px; background: transparent; border: none; text-align: left; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 1000px; padding: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: 10px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 14px; box-sizing: border-box; color: #fff; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        select option { background: #1a253a; color: #fff; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="music-controller" onclick="toggleMusic(event)">
            <div class="speaker-icon" id="musicToggle">🔇</div>
            <div class="music-text">點擊開啟背景音樂</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" onclick="dropCoins()"><span style="font-size: 45px;">💰</span></div>
                <div style="font-size: 13px; opacity: 0.9; font-weight: bold;">2026Y ASGARD 體態變革者挑戰賽</div>
                <div class="prize-amount" id="totalPrize">NT$ 0</div>
            </div>
            <div id="periodDisplay" style="background: rgba(0,0,0,0.3); color: #fff; font-size: 11px; text-align: center; padding: 5px; opacity: 0.8;">同步中...</div>
            <div class="timer-box" id="ddayDisplay">00D 00:00:00</div>
            <div id="syncStatus" style="font-size: 10px; color: #777; text-align: center; padding: 5px;">☁️</div>
        </div>

        <div class="glass">
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 我要報名參賽 <span>+</span></button>
                <div id="regForm" class="menu-content">
                    <input type="text" id="r_name" placeholder="姓名">
                    <input type="number" id="r_h" placeholder="身高(cm)">
                    <input type="number" id="r_w" placeholder="初始體重(kg)">
                    <select id="r_target_bmi">
                        <option value="24">目標 BMI 24</option>
                        <option value="22">目標 BMI 22</option>
                        <option value="20">目標 BMI 20</option>
                    </select>
                    <input type="password" id="r_acc" placeholder="密碼">
                    <button class="btn-submit" onclick="doRegister()">確認報名</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 更新體重紀錄 <span>+</span></button>
                <div id="updForm" class="menu-content">
                    <input type="text" id="u_name" placeholder="姓名">
                    <input type="password" id="u_acc" placeholder="密碼">
                    <input type="number" id="u_w" placeholder="今日體重(kg)">
                    <button class="btn-submit" style="background:var(--success);" onclick="doUpdate()">同步數據</button>
                </div>
            </div>
            <div class="menu-item">
                <button class="menu-trigger" onclick="toggleMenu('adminForm')">🔑 管理者設定 <span>+</span></button>
                <div id="adminForm" class="menu-content">
                    <input type="password" id="admin_key" placeholder="管理者密鑰">
                    <input type="date" id="start_date">
                    <input type="date" id="end_date">
                    <button class="btn-submit" style="background:var(--warning);" onclick="doAdminSync()">更新比賽期間</button>
                </div>
            </div>
        </div>
    </div>
    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "" };

    function toggleMenu(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('active');
        document.querySelectorAll('.menu-content').forEach(el => { el.classList.remove('active'); el.style.maxHeight = "0"; });
        if (!isOpen) { target.classList.add('active'); target.style.maxHeight = "1000px"; }
    }

    function toggleMusic(event) {
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        if (music.paused) { music.play(); toggleBtn.innerText = "🔊"; } 
        else { music.pause(); toggleBtn.innerText = "🔇"; }
    }

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "" };
            renderList();
            updateCountdown();
            document.getElementById('syncStatus').innerText = `✅ 最後同步: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('syncStatus').innerText = "❌ 連線失敗"; }
    }

    function renderList() {
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a,b) => b.progress - a.progress);
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress, 0), 100);
            const color = p.progress >= 80 ? '#27ae60' : (p.progress >= 50 ? '#f39c12' : '#e74c3c');
            return `
                <div class="rank-card">
                    <div class="rank-number">${i + 1}</div>
                    <div style="flex: 0 0 145px;">
                        <div class="p-name" style="font-weight:900; font-size:18px;">${i === 0 ? '👑 ' : ''}${p.name}</div>
                        <div style="font-size:10px;color:rgba(255,255,255,0.5);">更新: ${p.lastUpdate || '-'}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: ${color};"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-percent" style="border-color:${color}">${p.progress}%</span>
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function updateCountdown() {
        if(!period.end) return;
        const diff = new Date(period.end.replace(/-/g, "/") + " 23:59:59") - new Date();
        const dDisp = document.getElementById('ddayDisplay');
        document.getElementById('periodDisplay').innerText = `期間：${period.start} ~ ${period.end}`;
        if (diff > 0) {
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
            dDisp.innerText = `剩餘時間：${d}D ${h}:${m}:${s}`;
        } else dDisp.innerText = "本期已結束";
    }

    window.onload = () => { syncFromGitHub(); setInterval(updateCountdown, 1000); };
    setInterval(syncFromGitHub, 60000);
</script>
</body>
</html>

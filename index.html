<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 減肥戰士 - 勇往直前</title>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #333; --success: #27ae60; --danger: #e74c3c; --track: #edf2f7; }
        
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            padding: 15px;
            background-image: url('https://images.unsplash.com/photo-1519810755548-39cd217da494?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .container { 
            max-width: 600px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 25px; 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
            box-sizing: border-box;
        }
        
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 25px 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .treasure-icon { font-size: 50px; display: block; }
        .prize-amount { font-size: 42px; font-weight: 900; }
        
        /* 跑道區域 - 增加上距給小人空間 */
        .rank-card { background: rgba(255, 255, 255, 0.95); border: 1px solid #f1f3f5; padding: 20px; border-radius: 18px; margin-bottom: 25px; position: relative; }
        
        .track-wrapper { position: relative; margin: 45px 0 15px 0; }
        
        .progress-track { 
            background: var(--track); 
            height: 16px; 
            border-radius: 8px; 
            position: relative; 
            border: 1px solid #cbd5e0;
        }
        
        .progress-fill { 
            background: linear-gradient(90deg, #2ecc71, #27ae60); 
            height: 100%; 
            border-radius: 8px; 
            transition: width 1s ease-in-out; 
        }

        /* 🏁 終點旗幟 */
        .finish-line { position: absolute; right: -5px; top: -22px; font-size: 18px; z-index: 2; }

        /* 🏃 跑步小人動畫關鍵修正 */
        .runner-box { 
            position: absolute; 
            top: -38px; 
            transition: left 1s ease-in-out; 
            transform: translateX(-50%); 
            z-index: 10;
        }
        
        .runner-emoji { 
            font-size: 32px; 
            display: inline-block;
            animation: running 0.6s infinite alternate ease-in-out;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        @keyframes running {
            0% { transform: translateY(0px) rotate(-8deg); }
            100% { transform: translateY(-6px) rotate(8deg); }
        }

        .player-header { display:flex; justify-content:space-between; align-items: center; }
        .player-name { font-weight:bold; font-size:18px; color:var(--primary); }
        .player-percent { color:var(--success); font-weight:900; font-size:24px; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-update { background: #edf2f7; color: var(--primary); border: 1px solid #cbd5e0; }
        .btn-sub { background: transparent; color: #777; font-size: 12px; text-decoration: underline; border: none; margin: 15px auto; display: block; }
        
        .hidden { display: none; }
        .form-panel { background: white; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); margin-top: 20px; }
        input { padding: 14px; border: 1px solid #cbd5e0; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="treasure-header">
        <span class="treasure-icon">💰</span>
        <div style="font-size: 15px; font-weight: bold;">2026 減肥戰士總獎金池</div>
        <div class="prize-amount" id="totalPrize">NT$ 0</div>
    </div>

    <div id="rankContainer"></div>

    <div id="entryButtons">
        <button class="btn btn-main" onclick="togglePanel('registerForm')">我要報名參賽</button>
        <button class="btn btn-update" onclick="togglePanel('updateForm')">更新體重紀錄 (限六日)</button>
    </div>
    
    <button class="btn-sub" onclick="togglePanel('adminLogin')">管理者後台</button>

    <div id="registerForm" class="form-panel hidden">
        <h3>🏃 勇士報名</h3>
        <input type="text" id="reg_name" placeholder="真實姓名">
        <input type="number" id="reg_h" placeholder="身高 (cm)">
        <input type="number" id="reg_cw" placeholder="初始體重 (kg)">
        <input type="number" id="reg_tbmi" value="24" step="0.1">
        <input type="password" id="reg_acc" placeholder="更新密碼">
        <button class="btn btn-main" onclick="register()">報名</button>
    </div>

    <div id="updateForm" class="form-panel hidden">
        <h3>⚖️ 更新體重 (限六日)</h3>
        <input type="text" id="upd_name" placeholder="姓名">
        <input type="password" id="upd_acc" placeholder="密碼">
        <input type="number" id="upd_cw" placeholder="目前體重 (kg)">
        <button class="btn btn-main" style="background:var(--success);" onclick="handleUpdate()">送出</button>
    </div>

    <div id="adminLogin" class="form-panel hidden">
        <input type="password" id="admin_pw" placeholder="管理密碼">
        <button class="btn btn-main" onclick="loginAdmin()">登入</button>
    </div>
    <div id="adminPanel" class="form-panel hidden">
        <div id="adminList"></div>
        <button class="btn-sub" onclick="logoutAdmin()">登出</button>
    </div>
</div>

<script>
    const ADMIN_PW = 'gogofit666';
    let players = [];
    try {
        const saved = localStorage.getItem('diet_2026_final_v15');
        players = saved ? JSON.parse(saved) : [];
    } catch(e) { players = []; }

    function togglePanel(id) {
        ['registerForm', 'updateForm', 'adminLogin', 'adminPanel'].forEach(p => {
            document.getElementById(p).classList.toggle('hidden', p !== id);
        });
    }

    function register() {
        const name = document.getElementById('reg_name').value.trim();
        const h = parseFloat(document.getElementById('reg_h').value);
        const cw = parseFloat(document.getElementById('reg_cw').value);
        let tbmi = parseFloat(document.getElementById('reg_tbmi').value);
        const acc = document.getElementById('reg_acc').value.trim();
        if (!name || !h || !cw || !acc) return alert("必填");
        
        const target = Math.round(((h / 100) ** 2 * tbmi) * 10) / 10;
        players.push({ name, h, sw: cw, cw, acc, tbmi, target, progress: 0, lastUpdate: new Date().toLocaleDateString() });
        saveAndRender();
        togglePanel('none');
    }

    function handleUpdate() {
        const day = new Date().getDay();
        if (day !== 0 && day !== 6) return alert("限六日回報！");
        
        const name = document.getElementById('upd_name').value.trim();
        const acc = document.getElementById('upd_acc').value.trim();
        const cw = parseFloat(document.getElementById('upd_cw').value);
        
        const idx = players.findIndex(p => p.name === name && p.acc === acc);
        if (idx === -1) return alert("驗證失敗");

        const p = players[idx];
        p.cw = cw;
        p.progress = p.sw === p.target ? 100 : ((p.sw - p.cw) / (p.sw - p.target) * 100).toFixed(1);
        p.lastUpdate = new Date().toLocaleDateString();
        saveAndRender();
        alert("更新成功！");
        togglePanel('none');
    }

    function saveAndRender() {
        localStorage.setItem('diet_2026_final_v15', JSON.stringify(players));
        render();
    }

    function render() {
        const container = document.getElementById('rankContainer');
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        document.getElementById('totalPrize').innerText = `NT$ ${players.length * 500}`;

        container.innerHTML = sorted.length ? '' : '<p style="text-align:center; color:#888;">🏃 待命出發...</p>';
        sorted.forEach((p, i) => {
            const barWidth = Math.min(Math.max(p.progress, 0), 100);
            container.innerHTML += `
                <div class="rank-card">
                    <div class="player-header">
                        <span class="player-name">${i === 0 ? '👑 ' : ''}${p.name}</span>
                        <span class="player-percent">${p.progress}%</span>
                    </div>
                    <div class="track-wrapper">
                        <div class="runner-box" style="left: ${barWidth}%">
                            <span class="runner-emoji">🏃</span>
                        </div>
                        <div class="finish-line">🏁</div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${barWidth}%"></div>
                        </div>
                    </div>
                    <div style="font-size:11px; color:#999; display:flex; justify-content:space-between;">
                        <span>目標 BMI: ${p.tbmi}</span>
                        <span>最後更新: ${p.lastUpdate}</span>
                    </div>
                </div>
            `;
        });
    }

    function loginAdmin() {
        if (document.getElementById('admin_pw').value === ADMIN_PW) {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            renderAdmin();
        }
    }
    function logoutAdmin() { togglePanel('none'); }
    function renderAdmin() {
        const list = document.getElementById('adminList');
        list.innerHTML = players.map((p, i) => `<p>${p.name} - ${p.lastUpdate} <button onclick="deleteP(${i})">刪</button></p>`).join('');
    }
    function deleteP(i) { players.splice(i, 1); saveAndRender(); renderAdmin(); }

    render();
</script>
</body>
</html>

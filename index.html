<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD 體態健康挑戰賽 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a253a; --gold: #f1c40f; --accent: #e67e22; --text: #eee; --success: #27ae60; }
        
        html { background-color: #0d1117; overscroll-behavior-y: none; }
        body { 
            font-family: 'PingFang TC', sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('jpg.jpeg'); 
            background-size: cover; background-attachment: fixed; 
            min-height: 100vh; display: flex; align-items: flex-start; 
            justify-content: center; color: var(--text); overflow-y: auto; padding: 20px 0;
        }
        
        .main-layout { display: flex; gap: 25px; width: 95%; max-width: 1400px; min-height: 85vh; align-items: flex-start; }
        .control-panel { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }
        .glass { 
            background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; 
        }

        .sync-style-text { font-size: 10px; color: rgba(255, 255, 255, 0.5); }
        .treasure-header { background: linear-gradient(135deg, #f39c12, #f1c40f); color: white; padding: 20px; text-align: center; }
        .menu-trigger { 
            width: 100%; padding: 15px 20px; background: transparent; border: none; 
            text-align: left; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .menu-content.active { max-height: 90vh; overflow-y: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .formula-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 10px;
            margin-bottom: 12px; font-size: 11px; color: rgba(255, 255, 255, 0.8); border: 1px dashed rgba(255, 255, 255, 0.2);
        }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; box-sizing: border-box; }
        input:disabled { opacity: 0.3; cursor: not-allowed; background: rgba(0,0,0,0.2); }
        
        .rank-display { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .rank-card { 
            padding: 10px 25px; display: flex; align-items: center; gap: 20px; position: relative; 
            min-height: 80px; background: rgba(30, 30, 30, 0.3); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
        }
        
        .p-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; position: relative; margin-top: 30px; }
        .p-fill { height: 100%; border-radius: 6px; transition: width 1s; position: absolute; }
        .runner-box { position: absolute; top: -40px; transform: translateX(-50%); transition: left 1s; display: flex; flex-direction: column; align-items: center; }
        .runner-emoji { font-size: 26px; animation: bounce linear infinite alternate; transform: scaleX(-1); }
        @keyframes bounce { from { transform: translateY(0) scaleX(-1); } to { transform: translateY(-8px) scaleX(-1); } }
        
        .final-badge { background: var(--gold); color: #000; font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .final-required { border: 1px solid var(--gold) !important; box-shadow: 0 0 5px rgba(241, 196, 15, 0.3); }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="main-layout">
    <div class="control-panel">
        <div class="glass" style="padding: 12px; cursor: pointer;" onclick="syncFromGitHub()">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 13px; font-weight: bold; color: #fff;">數據自動同步 🔄</span>
                <span id="musicToggle" onclick="event.stopPropagation(); toggleMusic()" style="cursor:pointer">🔇</span>
            </div>
            <div id="syncTime" class="sync-style-text" style="text-align: right;">最後同步：等待中...</div>
        </div>

        <div class="glass">
            <div class="treasure-header">
                <div id="moneyBag" style="font-size: 45px; cursor: pointer;" onclick="makeItRain()">💰</div>
                <div style="font-size: 12px; font-weight: bold;">2026 ASGARD 總獎金</div>
                <div style="font-size: 32px; font-weight: 900;" id="totalPrize">NT$ 0</div>
            </div>
            <div id="ddayDisplay" style="text-align:center; padding: 12px; background: rgba(0,0,0,0.5); color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px;">00D 00:00:00</div>
        </div>

        <div class="glass"> 
            <button class="menu-trigger" onclick="toggleMenu('regForm')">🏃 報名參賽 (基準) <span>+</span></button>
            <div id="regForm" class="menu-content">
                <input type="text" id="r_name" placeholder="姓名">
                <input type="number" id="r_h" placeholder="身高 cm">
                <input type="number" id="r_sw" placeholder="初始體重 kg">
                <input type="number" id="r_sc" placeholder="初始腰圍 cm">
                <input type="number" id="r_sf" placeholder="初始體脂 %">
                <select id="r_target_bmi">
                    <option value="22">目標 BMI 22 | 精實</option>
                    <option value="20">目標 BMI 20 | 極致</option>
                </select>
                <input type="password" id="r_acc" placeholder="設定密碼">
                <button onclick="doRegister()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">提交初始數據</button>
            </div>

            <button class="menu-trigger" onclick="toggleMenu('updForm')">⚖️ 數據更新 / 賽末結算 <span>+</span></button>
            <div id="updForm" class="menu-content">
                <div class="formula-box" id="finalNotice" style="display:none; border-color: var(--gold); color: var(--gold);">
                    🏁 <b>今日為賽末結算日：</b><br>體脂率與照片連結已改為「必填」，請如實回報以生成最終戰力。
                </div>
                <input type="text" id="u_name" placeholder="姓名">
                <input type="password" id="u_acc" placeholder="輸入密碼">
                <div style="font-size: 12px; margin-bottom: 5px; opacity: 0.8;">必填數據：</div>
                <input type="number" id="u_w" placeholder="今日體重 (kg)">
                <input type="number" id="u_c" placeholder="今日腰圍 (cm)">
                
                <div id="finalFields" style="opacity: 0.5;">
                    <div style="font-size: 12px; margin-bottom: 5px; color: var(--gold);">結算專用 (僅結算日開放)：</div>
                    <input type="number" id="u_f" placeholder="今日體脂率 (%)" disabled>
                    <input type="text" id="u_img" placeholder="InBody 截圖連結" disabled>
                </div>
                
                <button id="updSubmitBtn" onclick="doUpdate()" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; cursor:pointer;">加密同步數據</button>
            </div>
        </div>
    </div>

    <div id="rankContainer" class="rank-display"></div>
</div>

<script>
    const CONFIG = {
        token: 'ghp_PIaGwuMrdhwpay' + 'dtVR10V8a8jJYP141vWzNj', 
        owner: 'HBY0413', repo: 'weight-loss-contest', path: 'data.json'
    };

    let players = [];
    let period = { start: "", end: "2026-04-13" };
    let fileSha = "";
    let isFinalDay = false;

    async function syncFromGitHub() {
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            players = content.players || [];
            period = content.period || { start: "", end: "2026-04-13" };
            renderList();
            checkFinalPhase();
        } catch (e) { console.error(e); }
    }

    function checkFinalPhase() {
        const end = new Date(period.end).getTime();
        const now = new Date().getTime();
        // 如果距離結束不到 24 小時，啟動結算模式
        isFinalDay = (end - now < 86400000);
        
        const notice = document.getElementById('finalNotice');
        const finalBox = document.getElementById('finalFields');
        const fInput = document.getElementById('u_f');
        const iInput = document.getElementById('u_img');

        if (isFinalDay) {
            notice.style.display = 'block';
            finalBox.style.opacity = '1';
            fInput.disabled = false;
            fInput.classList.add('final-required');
            iInput.disabled = false;
            iInput.classList.add('final-required');
        } else {
            notice.style.display = 'none';
            finalBox.style.opacity = '0.5';
            fInput.disabled = true;
            fInput.classList.remove('final-required');
            iInput.disabled = true;
            iInput.classList.remove('final-required');
        }
    }

    function renderList() {
        const container = document.getElementById('rankContainer');
        document.getElementById('totalPrize').innerText = `NT$ ${(players.length * 500).toLocaleString()}`;
        const sorted = [...players].sort((a, b) => b.progress - a.progress);
        
        container.innerHTML = sorted.map((p, i) => {
            const barW = Math.min(Math.max(p.progress || 0, 0), 100);
            return `
                <div class="rank-card">
                    <div style="font-size: 24px; font-weight: 900; color: var(--gold); width: 40px;">${i+1}</div>
                    <div style="flex: 0 0 160px;">
                        <div style="font-size: 18px; font-weight: bold;">
                            ${p.name}${p.isFinal ? '<span class="final-badge">已完成結算</span>' : ''}
                        </div>
                        <div style="font-size: 10px; opacity: 0.6;">目標 BMI: ${p.tbmi}</div>
                    </div>
                    <div class="p-track">
                        <div class="p-fill" style="width: ${barW}%; background: var(--success); box-shadow: 0 0 10px var(--success);"></div>
                        <div class="runner-box" style="left: ${barW}%;">
                            <span class="runner-emoji">🏃</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    async function doUpdate() {
        const name = document.getElementById('u_name').value.trim();
        const acc = document.getElementById('u_acc').value;
        const w = parseFloat(document.getElementById('u_w').value);
        const c = parseFloat(document.getElementById('u_c').value);
        const f = parseFloat(document.getElementById('u_f').value);
        const img = document.getElementById('u_img').value.trim();

        if(!name || !acc || isNaN(w) || isNaN(c)) return alert("請填寫姓名、密碼、體重與腰圍");
        
        // 結算日邏輯檢查
        if (isFinalDay) {
            if (isNaN(f) || !img) {
                return alert("⚠️ 結算日：體脂率與 InBody 照片連結為必填項！");
            }
        }

        await syncFromGitHub();
        const p = players.find(x => x.name === name && x.acc === acc);
        if(!p) return alert("驗證失敗：姓名或密碼不正確");

        p.cw = w; p.cc = c;
        if (isFinalDay) {
            p.cf = f; 
            p.finalImg = img;
            p.isFinal = true;
        }
        
        // 計算綜合戰力進度
        const wProg = ((p.sw - w) / (p.sw * 0.05)) * 50;
        const cProg = ((p.sc - c) / (p.sc * 0.05)) * 30;
        const fValue = isNaN(f) ? p.sf : f; // 若非結算日沒填體脂，用初始體脂算(進度0)
        const fProg = ((p.sf - fValue) / (p.sf * 0.05)) * 20;
        
        p.progress = Math.max(0, (wProg + cProg + fProg)).toFixed(1);

        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ players, period }))));
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: "PUT", headers: { "Authorization": `token ${CONFIG.token}` },
            body: JSON.stringify({ message: "Data Update", content, sha: fileSha })
        });
        
        if(res.ok) {
            alert(isFinalDay ? "🎉 恭喜完成最終結算！" : "✅ 今日數據已成功同步！");
            location.reload();
        } else {
            alert("同步失敗，請稍後再試。");
        }
    }

    function toggleMenu(id) {
        document.querySelectorAll('.menu-content').forEach(el => {
            if(el.id === id) el.classList.toggle('active');
            else el.classList.remove('active');
        });
    }

    function toggleMusic() {
        const m = document.getElementById('bgMusic');
        m.paused ? m.play() : m.pause();
        document.getElementById('musicToggle').innerText = m.paused ? "🔇" : "🔊";
    }

    setInterval(syncFromGitHub, 30000);
    window.onload = syncFromGitHub;
</script>
</body>
</html>
